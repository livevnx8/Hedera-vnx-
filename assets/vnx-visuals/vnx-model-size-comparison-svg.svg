<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="550" viewBox="0 0 1000 550">
  <defs>
    <style>
      .bg { fill: #0c1020; }
      .panel { fill: #111633; stroke: #1e2a4a; stroke-width: 1.5; rx: 6; }
      .hero { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 20px; font-weight: 700; fill: #e2e8f0; }
      .title { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 13px; font-weight: 600; fill: #8892b0; }
      .label { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 11px; font-weight: 500; fill: #ccd6f6; }
      .sub { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 9px; fill: #5c6b9a; }
      .sizelabel { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 10px; font-weight: 600; fill: #0c1020; }
    </style>
  </defs>
  <rect width="1000" height="550" class="bg"/>
  <text x="500" y="36" text-anchor="middle" class="hero">Model Size Comparison — VNX BitLattice vs Industry Standards</text>

  <!-- Visual scale: circles proportional to model size -->
  <g transform="translate(500,300)">
    <!-- GPT-4 (largest, background faint) -->
    <circle cx="0" cy="0" r="200" fill="#1e2a4a" opacity="0.3" stroke="#1e2a4a" stroke-width="1"/>
    <text x="0" y="-180" text-anchor="middle" class="sub">GPT-4 (~1.8 TB)</text>
    
    <!-- GPT-2 -->
    <circle cx="0" cy="0" r="55" fill="#ef4444" opacity="0.4" stroke="#ef4444" stroke-width="1"/>
    <text x="0" y="-48" text-anchor="middle" class="sub" style="fill:#ef4444;">GPT-2 (548 MB)</text>
    
    <!-- ResNet-50 -->
    <circle cx="0" cy="0" r="18" fill="#f97316" opacity="0.6" stroke="#f97316" stroke-width="1"/>
    <text x="0" y="-22" text-anchor="middle" class="sub" style="fill:#f97316;">ResNet-50 (98 MB)</text>
    
    <!-- MobileNetV2 -->
    <circle cx="0" cy="0" r="5" fill="#7c3aed" opacity="0.8" stroke="#7c3aed" stroke-width="1"/>
    <text x="0" y="-10" text-anchor="middle" class="sub" style="fill:#7c3aed;">MobileNet (14 MB)</text>
    
    <!-- BitLattice (center, bright) -->
    <circle cx="0" cy="0" r="1.5" fill="#00ffa3" stroke="#00ffa3" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" class="label" style="fill:#00ffa3;">BitLattice</text>
    <text x="0" y="22" text-anchor="middle" class="label" style="fill:#00ffa3;font-size:14px;">63 KB</text>
  </g>

  <!-- Right side: Data table -->
  <g transform="translate(60,80)">
    <rect width="380" height="340" class="panel"/>
    <text x="190" y="25" text-anchor="middle" class="title">Model Size Breakdown</text>
    
    <!-- Table header -->
    <text x="20" y="50" class="title">Model</text>
    <text x="200" y="50" class="title">Size</text>
    <text x="290" y="50" class="title">vs BitLattice</text>
    <line x1="20" y1="55" x2="360" y2="55" stroke="#1e2a4a" stroke-width="0.5"/>
    
    <!-- Rows -->
    <text x="20" y="78" class="label" style="fill:#00ffa3;">VNX BitLattice</text>
    <text x="200" y="78" class="label">63 KB</text>
    <text x="290" y="78" class="label" style="fill:#00ffa3;">1×</text>
    
    <text x="20" y="108" class="label">MobileNetV2</text>
    <text x="200" y="108" class="label">14 MB</text>
    <text x="290" y="108" class="sub">227× larger</text>
    
    <text x="20" y="138" class="label">ResNet-50</text>
    <text x="200" y="138" class="label">98 MB</text>
    <text x="290" y="138" class="sub">1,590× larger</text>
    
    <text x="20" y="168" class="label">YOLOv8 (nano)</text>
    <text x="200" y="168" class="label">6.2 MB</text>
    <text x="290" y="168" class="sub">100× larger</text>
    
    <text x="20" y="198" class="label">GPT-2 (124M)</text>
    <text x="200" y="198" class="label">548 MB</text>
    <text x="290" y="198" class="sub">8,889× larger</text>
    
    <text x="20" y="228" class="label">BERT-base</text>
    <text x="200" y="228" class="label">440 MB</text>
    <text x="290" y="228" class="sub">7,143× larger</text>
    
    <text x="20" y="258" class="label">Llama 2 (7B)</text>
    <text x="200" y="258" class="label">13.5 GB</text>
    <text x="290" y="258" class="sub">219,000× larger</text>
    
    <text x="20" y="288" class="label">GPT-4 (est)</text>
    <text x="200" y="288" class="label">~1.8 TB</text>
    <text x="290" y="288" class="sub">29,000,000× larger</text>
    
    <!-- Divider -->
    <line x1="20" y1="305" x2="360" y2="305" stroke="#1e2a4a" stroke-width="0.5"/>
    <text x="20" y="325" class="sub">BitLattice packs 5 ternary weights per byte. A float32 model needs 32 bits per weight.</text>
  </g>

  <!-- Bottom: Deployment implications -->
  <text x="500" y="460" text-anchor="middle" class="title" style="font-size:14px;">What 63 KB Enables</text>

  <g transform="translate(60,490)">
    <rect width="200" height="50" class="panel"/>
    <text x="100" y="22" text-anchor="middle" class="label" style="fill:#00ffa3;">Raspberry Pi</text>
    <text x="100" y="40" text-anchor="middle" class="sub">Runs on $35 hardware</text>
  </g>
  <g transform="translate(290,490)">
    <rect width="200" height="50" class="panel"/>
    <text x="100" y="22" text-anchor="middle" class="label" style="fill:#1e90ff;">Browser WASM</text>
    <text x="100" y="40" text-anchor="middle" class="sub">No server needed</text>
  </g>
  <g transform="translate(520,490)">
    <rect width="200" height="50" class="panel"/>
    <text x="100" y="22" text-anchor="middle" class="label" style="fill:#7c3aed;">IoT Sensor</text>
    <text x="100" y="40" text-anchor="middle" class="sub">KB flash, mW power</text>
  </g>
  <g transform="translate(750,490)">
    <rect width="200" height="50" class="panel"/>
    <text x="100" y="22" text-anchor="middle" class="label" style="fill:#f97316;">Edge Router</text>
    <text x="100" y="40" text-anchor="middle" class="sub">No cloud roundtrip</text>
  </g>
</svg>
