<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="nodeIn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="nodeHid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="nodeOut" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad)"/>
  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="700"/><line x1="400" y1="0" x2="400" y2="700"/>
    <line x1="600" y1="0" x2="600" y2="700"/><line x1="800" y1="0" x2="800" y2="700"/>
    <line x1="1000" y1="0" x2="1000" y2="700"/>
  </g>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#f8fafc" filter="url(#glow)">BitLattice Architecture</text>
  <text x="600" y="66" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="13" fill="#64748b">Ternary-Weight Neural Lattice · {-1, 0, +1} · 5 weights per byte · 63KB total</text>

  <!-- ═══ LAYER LABELS ═══ -->
  <text x="130" y="100" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#06b6d4" letter-spacing="1">INPUT LAYER</text>
  <text x="390" y="100" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7c3aed" letter-spacing="1">LATTICE LAYER 1</text>
  <text x="600" y="100" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#8b5cf6" letter-spacing="1">ROUTING CORE</text>
  <text x="810" y="100" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7c3aed" letter-spacing="1">LATTICE LAYER 2</text>
  <text x="1070" y="100" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#10b981" letter-spacing="1">OUTPUT LAYER</text>

  <!-- ═══ CONNECTIONS (drawn first, behind nodes) ═══ -->
  <!-- Input to L1 — Excitatory (+1) connections: cyan -->
  <g stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.6">
    <line x1="180" y1="180" x2="330" y2="160"/>
    <line x1="180" y1="180" x2="330" y2="260"/>
    <line x1="180" y1="270" x2="330" y2="260"/>
    <line x1="180" y1="270" x2="330" y2="360"/>
    <line x1="180" y1="360" x2="330" y2="360"/>
    <line x1="180" y1="360" x2="330" y2="460"/>
    <line x1="180" y1="450" x2="330" y2="460"/>
    <line x1="180" y1="450" x2="330" y2="560"/>
    <line x1="180" y1="540" x2="330" y2="560"/>
  </g>
  <!-- Inhibitory (-1) connections: red/orange dashed -->
  <g stroke="#f43f5e" stroke-width="1.2" fill="none" opacity="0.5" stroke-dasharray="4,3">
    <line x1="180" y1="180" x2="330" y2="360"/>
    <line x1="180" y1="360" x2="330" y2="160"/>
    <line x1="180" y1="540" x2="330" y2="360"/>
  </g>

  <!-- L1 to Routing Core -->
  <g stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.5">
    <line x1="440" y1="160" x2="545" y2="230"/>
    <line x1="440" y1="260" x2="545" y2="280"/>
    <line x1="440" y1="360" x2="545" y2="330"/>
    <line x1="440" y1="460" x2="545" y2="380"/>
    <line x1="440" y1="560" x2="545" y2="430"/>
    <line x1="440" y1="160" x2="545" y2="330"/>
    <line x1="440" y1="360" x2="545" y2="430"/>
  </g>
  <g stroke="#f43f5e" stroke-width="1.2" fill="none" opacity="0.4" stroke-dasharray="4,3">
    <line x1="440" y1="260" x2="545" y2="430"/>
    <line x1="440" y1="560" x2="545" y2="230"/>
  </g>

  <!-- Routing Core to L2 -->
  <g stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.5">
    <line x1="655" y1="230" x2="755" y2="180"/>
    <line x1="655" y1="280" x2="755" y2="280"/>
    <line x1="655" y1="330" x2="755" y2="380"/>
    <line x1="655" y1="380" x2="755" y2="480"/>
    <line x1="655" y1="430" x2="755" y2="580"/>
    <line x1="655" y1="280" x2="755" y2="180"/>
    <line x1="655" y1="380" x2="755" y2="280"/>
  </g>
  <g stroke="#f43f5e" stroke-width="1.2" fill="none" opacity="0.4" stroke-dasharray="4,3">
    <line x1="655" y1="230" x2="755" y2="480"/>
    <line x1="655" y1="430" x2="755" y2="180"/>
  </g>

  <!-- L2 to Output -->
  <g stroke="#10b981" stroke-width="1.8" fill="none" opacity="0.6">
    <line x1="860" y1="180" x2="1010" y2="280"/>
    <line x1="860" y1="280" x2="1010" y2="280"/>
    <line x1="860" y1="380" x2="1010" y2="380"/>
    <line x1="860" y1="480" x2="1010" y2="380"/>
    <line x1="860" y1="580" x2="1010" y2="480"/>
    <line x1="860" y1="180" x2="1010" y2="380"/>
    <line x1="860" y1="380" x2="1010" y2="480"/>
  </g>

  <!-- ═══ INPUT NODES ═══ -->
  <g filter="url(#shadow)">
    <circle cx="130" cy="180" r="22" fill="url(#nodeIn)" opacity="0.9"/>
    <circle cx="130" cy="270" r="22" fill="url(#nodeIn)" opacity="0.9"/>
    <circle cx="130" cy="360" r="22" fill="url(#nodeIn)" opacity="0.9"/>
    <circle cx="130" cy="450" r="22" fill="url(#nodeIn)" opacity="0.9"/>
    <circle cx="130" cy="540" r="22" fill="url(#nodeIn)" opacity="0.9"/>
  </g>
  <text x="130" y="185" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#fff">RSI</text>
  <text x="130" y="275" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#fff">SMA</text>
  <text x="130" y="365" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#fff">VOL</text>
  <text x="130" y="455" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#fff">BB%</text>
  <text x="130" y="545" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#fff">MOM</text>

  <!-- ═══ LATTICE LAYER 1 ═══ -->
  <g filter="url(#shadow)">
    <rect x="355" y="145" width="60" height="30" rx="6" fill="url(#nodeHid)" opacity="0.85"/>
    <rect x="355" y="245" width="60" height="30" rx="6" fill="url(#nodeHid)" opacity="0.85"/>
    <rect x="355" y="345" width="60" height="30" rx="6" fill="url(#nodeHid)" opacity="0.85"/>
    <rect x="355" y="445" width="60" height="30" rx="6" fill="url(#nodeHid)" opacity="0.85"/>
    <rect x="355" y="545" width="60" height="30" rx="6" fill="url(#nodeHid)" opacity="0.85"/>
  </g>
  <text x="385" y="165" text-anchor="middle" font-family="monospace" font-size="9" fill="#e2e8f0">+1 +1</text>
  <text x="385" y="265" text-anchor="middle" font-family="monospace" font-size="9" fill="#e2e8f0">-1 +1</text>
  <text x="385" y="365" text-anchor="middle" font-family="monospace" font-size="9" fill="#e2e8f0">+1  0</text>
  <text x="385" y="465" text-anchor="middle" font-family="monospace" font-size="9" fill="#e2e8f0"> 0 -1</text>
  <text x="385" y="565" text-anchor="middle" font-family="monospace" font-size="9" fill="#e2e8f0">+1 +1</text>

  <!-- ═══ ROUTING CORE ═══ -->
  <rect x="545" y="200" width="110" height="260" rx="12" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  <text x="600" y="225" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#a78bfa">LATTICE</text>
  <text x="600" y="240" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#a78bfa">ROUTING</text>
  <!-- Core nodes -->
  <circle cx="575" cy="280" r="10" fill="#7c3aed" opacity="0.7"/>
  <circle cx="625" cy="280" r="10" fill="#7c3aed" opacity="0.7"/>
  <circle cx="575" cy="330" r="10" fill="#7c3aed" opacity="0.7"/>
  <circle cx="625" cy="330" r="10" fill="#7c3aed" opacity="0.7"/>
  <circle cx="575" cy="380" r="10" fill="#7c3aed" opacity="0.7"/>
  <circle cx="625" cy="380" r="10" fill="#7c3aed" opacity="0.7"/>
  <circle cx="600" cy="430" r="10" fill="#7c3aed" opacity="0.7"/>
  <!-- Core internal connections -->
  <g stroke="#a78bfa" stroke-width="0.8" opacity="0.4">
    <line x1="575" y1="280" x2="625" y2="330"/>
    <line x1="625" y1="280" x2="575" y2="330"/>
    <line x1="575" y1="330" x2="625" y2="380"/>
    <line x1="625" y1="330" x2="575" y2="380"/>
    <line x1="575" y1="380" x2="600" y2="430"/>
    <line x1="625" y1="380" x2="600" y2="430"/>
  </g>

  <!-- ═══ LATTICE LAYER 2 ═══ -->
  <g filter="url(#shadow)">
    <rect x="775" y="165" width="60" height="30" rx="6" fill="url(#nodeHid)" opacity="0.85"/>
    <rect x="775" y="265" width="60" height="30" rx="6" fill="url(#nodeHid)" opacity="0.85"/>
    <rect x="775" y="365" width="60" height="30" rx="6" fill="url(#nodeHid)" opacity="0.85"/>
    <rect x="775" y="465" width="60" height="30" rx="6" fill="url(#nodeHid)" opacity="0.85"/>
    <rect x="775" y="565" width="60" height="30" rx="6" fill="url(#nodeHid)" opacity="0.85"/>
  </g>
  <text x="805" y="185" text-anchor="middle" font-family="monospace" font-size="9" fill="#e2e8f0">+1 -1</text>
  <text x="805" y="285" text-anchor="middle" font-family="monospace" font-size="9" fill="#e2e8f0">+1 +1</text>
  <text x="805" y="385" text-anchor="middle" font-family="monospace" font-size="9" fill="#e2e8f0"> 0 +1</text>
  <text x="805" y="485" text-anchor="middle" font-family="monospace" font-size="9" fill="#e2e8f0">-1  0</text>
  <text x="805" y="585" text-anchor="middle" font-family="monospace" font-size="9" fill="#e2e8f0">+1 +1</text>

  <!-- ═══ OUTPUT NODES ═══ -->
  <g filter="url(#shadow)">
    <circle cx="1070" cy="280" r="28" fill="url(#nodeOut)" opacity="0.9"/>
    <circle cx="1070" cy="380" r="28" fill="url(#nodeOut)" opacity="0.9"/>
    <circle cx="1070" cy="480" r="28" fill="url(#nodeOut)" opacity="0.9"/>
  </g>
  <text x="1070" y="275" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#fff">UP</text>
  <text x="1070" y="290" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="8" fill="#d1fae5">0.72</text>
  <text x="1070" y="375" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#fff">DOWN</text>
  <text x="1070" y="390" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="8" fill="#d1fae5">0.28</text>
  <text x="1070" y="475" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#fff">CONF</text>
  <text x="1070" y="490" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="8" fill="#d1fae5">0.82</text>

  <!-- ═══ FLOW ARROWS ═══ -->
  <!-- Input arrow -->
  <polygon points="30,360 60,345 60,375" fill="#06b6d4" opacity="0.8"/>
  <line x1="60" y1="360" x2="100" y2="360" stroke="#06b6d4" stroke-width="2.5" opacity="0.8"/>
  <text x="45" y="335" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#06b6d4">14</text>
  <text x="45" y="395" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="9" fill="#64748b">features</text>

  <!-- Output arrow -->
  <line x1="1100" y1="380" x2="1150" y2="380" stroke="#10b981" stroke-width="2.5" opacity="0.8"/>
  <polygon points="1150,365 1180,380 1150,395" fill="#10b981" opacity="0.8"/>
  <text x="1165" y="360" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#10b981">P(dir)</text>
  <text x="1165" y="415" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="9" fill="#64748b">prediction</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="40" y="600" width="320" height="75" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="60" y="622" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Connection Types</text>
  <line x1="60" y1="640" x2="100" y2="640" stroke="#06b6d4" stroke-width="2"/>
  <text x="110" y="644" font-family="Inter,-apple-system,sans-serif" font-size="10" fill="#94a3b8">+1 Excitatory (signal passes)</text>
  <line x1="60" y1="660" x2="100" y2="660" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="110" y="664" font-family="Inter,-apple-system,sans-serif" font-size="10" fill="#94a3b8">-1 Inhibitory (signal inverted)</text>
  <text x="60" y="680" font-family="Inter,-apple-system,sans-serif" font-size="10" fill="#475569">0 = pruned (no computation)</text>

  <!-- ═══ METRICS PANEL ═══ -->
  <rect x="840" y="600" width="320" height="75" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="860" y="622" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Performance</text>
  <text x="860" y="643" font-family="monospace" font-size="10" fill="#10b981">63 KB</text>
  <text x="920" y="643" font-family="Inter,-apple-system,sans-serif" font-size="10" fill="#94a3b8">model size (70% smaller)</text>
  <text x="860" y="660" font-family="monospace" font-size="10" fill="#10b981">14 μs</text>
  <text x="920" y="660" font-family="Inter,-apple-system,sans-serif" font-size="10" fill="#94a3b8">inference time (6.23× faster)</text>
  <text x="860" y="677" font-family="monospace" font-size="10" fill="#10b981">5 wt/byte</text>
  <text x="940" y="677" font-family="Inter,-apple-system,sans-serif" font-size="10" fill="#94a3b8">ternary packing density</text>

  <!-- ═══ TERNARY WEIGHT VISUALIZATION ═══ -->
  <rect x="420" y="600" width="380" height="75" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="440" y="622" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Ternary Weight Byte</text>
  <!-- 5 weight slots in one byte -->
  <rect x="440" y="635" width="44" height="28" rx="4" fill="#7c3aed" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="462" y="654" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#fff">+1</text>
  <rect x="490" y="635" width="44" height="28" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="512" y="654" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#64748b">0</text>
  <rect x="540" y="635" width="44" height="28" rx="4" fill="#f43f5e" stroke="#fb7185" stroke-width="0.5"/>
  <text x="562" y="654" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#fff">-1</text>
  <rect x="590" y="635" width="44" height="28" rx="4" fill="#7c3aed" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="612" y="654" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#fff">+1</text>
  <rect x="640" y="635" width="44" height="28" rx="4" fill="#7c3aed" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="662" y="654" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#fff">+1</text>
  <text x="440" y="680" font-family="Inter,-apple-system,sans-serif" font-size="9" fill="#64748b">1 byte = 5 ternary weights = 3⁵ = 243 states (vs 32 bits for 1 float)</text>

</svg>
