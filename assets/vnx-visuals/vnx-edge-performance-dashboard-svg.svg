<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <style>
      .bg { fill: #0c1020; }
      .panel { fill: #111633; stroke: #1e2a4a; stroke-width: 1.5; rx: 6; }
      .hero { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 20px; font-weight: 700; fill: #e2e8f0; }
      .title { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 13px; font-weight: 600; fill: #8892b0; }
      .label { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 11px; font-weight: 500; fill: #ccd6f6; }
      .sub { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 9px; fill: #5c6b9a; }
      .big { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 20px; font-weight: 700; fill: #00ffa3; }
      .gaugebg { stroke: #1e2a4a; stroke-width: 8; fill: none; stroke-linecap: round; }
      .gaugeval { stroke: #00ffa3; stroke-width: 8; fill: none; stroke-linecap: round; }
      .gaugeval2 { stroke: #1e90ff; stroke-width: 8; fill: none; stroke-linecap: round; }
      .gaugeval3 { stroke: #f97316; stroke-width: 8; fill: none; stroke-linecap: round; }
    </style>
  </defs>
  <rect width="1200" height="650" class="bg"/>
  <text x="600" y="36" text-anchor="middle" class="hero">VNX Edge Performance Dashboard — Live Metrics</text>

  <!-- Top row: 4 gauges -->
  <g transform="translate(120,70)">
    <rect width="240" height="160" class="panel"/>
    <text x="120" y="22" text-anchor="middle" class="title">INFERENCE LATENCY</text>
    <text x="120" y="55" text-anchor="middle" class="big">14 μs</text>
    <text x="120" y="78" text-anchor="middle" class="sub">CPU L1 cache</text>
    <text x="120" y="92" text-anchor="middle" class="sub">Zero GPU overhead</text>
    <!-- Mini bar -->
    <rect x="40" y="110" width="160" height="6" fill="#1e2a4a" rx="3"/>
    <rect x="40" y="110" width="4" height="6" fill="#00ffa3" rx="3"/>
    <text x="120" y="135" text-anchor="middle" class="sub">Target: &lt;100 μs ✓</text>
  </g>

  <g transform="translate(400,70)">
    <rect width="240" height="160" class="panel"/>
    <text x="120" y="22" text-anchor="middle" class="title">SWARM ACCURACY</text>
    <text x="120" y="55" text-anchor="middle" class="big" style="fill:#1e90ff;">80.0%</text>
    <text x="120" y="78" text-anchor="middle" class="sub">HBAR 5-min direction</text>
    <text x="120" y="92" text-anchor="middle" class="sub">6-agent consensus</text>
    <!-- Mini bar -->
    <rect x="40" y="110" width="160" height="6" fill="#1e2a4a" rx="3"/>
    <rect x="40" y="110" width="128" height="6" fill="#1e90ff" rx="3"/>
    <text x="120" y="135" text-anchor="middle" class="sub">Target: 75%+ ✓</text>
  </g>

  <g transform="translate(680,70)">
    <rect width="240" height="160" class="panel"/>
    <text x="120" y="22" text-anchor="middle" class="title">MODEL SIZE</text>
    <text x="120" y="55" text-anchor="middle" class="big" style="fill:#7c3aed;">63 KB</text>
    <text x="120" y="78" text-anchor="middle" class="sub">5 weights per byte</text>
    <text x="120" y="92" text-anchor="middle" class="sub">Ternary {-1,0,+1}</text>
    <!-- Mini bar -->
    <rect x="40" y="110" width="160" height="6" fill="#1e2a4a" rx="3"/>
    <rect x="40" y="110" width="3" height="6" fill="#7c3aed" rx="3"/>
    <text x="120" y="135" text-anchor="middle" class="sub">Target: &lt;1 MB ✓</text>
  </g>

  <g transform="translate(960,70)">
    <rect width="120" height="160" class="panel"/>
    <text x="60" y="22" text-anchor="middle" class="title">HCS</text>
    <text x="60" y="55" text-anchor="middle" class="big" style="fill:#00ffa3;">LIVE</text>
    <text x="60" y="78" text-anchor="middle" class="sub">Proving every</text>
    <text x="60" y="92" text-anchor="middle" class="sub">prediction to</text>
    <text x="60" y="106" text-anchor="middle" class="sub">testnet topic</text>
    <circle cx="60" cy="130" r="6" fill="#00ffa3"/>
  </g>

  <!-- Middle: Agent performance table -->
  <text x="600" y="270" text-anchor="middle" class="title" style="font-size:14px;">Per-Agent Performance (Last 50 Predictions)</text>
  
  <g transform="translate(120,290)">
    <rect width="960" height="200" class="panel"/>
    
    <!-- Header -->
    <text x="20" y="25" class="title">Agent</text>
    <text x="200" y="25" class="title">Accuracy</text>
    <text x="320" y="25" class="title">Weight</text>
    <text x="430" y="25" class="title">Strategy</text>
    <text x="700" y="25" class="title">Status</text>
    <line x1="20" y1="32" x2="940" y2="32" stroke="#1e2a4a" stroke-width="0.5"/>
    
    <!-- Row 1 -->
    <text x="20" y="55" class="label" style="fill:#00ffa3;">BitLattice-ONNX</text>
    <text x="200" y="55" class="label">82%</text>
    <text x="320" y="55" class="label">1.32</text>
    <text x="430" y="55" class="sub">Quantized neural net · 14 features</text>
    <text x="700" y="55" class="label" style="fill:#00ffa3;">Leading</text>
    <rect x="200" y="45" width="82" height="4" fill="#00ffa3" rx="2"/>
    
    <!-- Row 2 -->
    <text x="20" y="82" class="label">RSI-Agent</text>
    <text x="200" y="82" class="label">76%</text>
    <text x="320" y="82" class="label">1.26</text>
    <text x="430" y="82" class="sub">Mean-reversion on RSI(14)</text>
    <text x="700" y="82" class="label" style="fill:#1e90ff;">Strong</text>
    <rect x="200" y="72" width="76" height="4" fill="#1e90ff" rx="2"/>
    
    <!-- Row 3 -->
    <text x="20" y="109" class="label">BB-Agent</text>
    <text x="200" y="109" class="label">74%</text>
    <text x="320" y="109" class="label">1.24</text>
    <text x="430" y="109" class="sub">Bollinger Band edge detection</text>
    <text x="700" y="109" class="label" style="fill:#1e90ff;">Strong</text>
    <rect x="200" y="99" width="74" height="4" fill="#1e90ff" rx="2"/>
    
    <!-- Row 4 -->
    <text x="20" y="136" class="label">SMA-Cross</text>
    <text x="200" y="136" class="label">70%</text>
    <text x="320" y="136" class="label">1.20</text>
    <text x="430" y="136" class="sub">5/10 period crossover</text>
    <text x="700" y="136" class="label" style="fill:#f97316;">Stable</text>
    <rect x="200" y="126" width="70" height="4" fill="#f97316" rx="2"/>
    
    <!-- Row 5 -->
    <text x="20" y="163" class="label">Momentum</text>
    <text x="200" y="163" class="label">68%</text>
    <text x="320" y="163" class="label">1.18</text>
    <text x="430" y="163" class="sub">3-tick velocity tracking</text>
    <text x="700" y="163" class="label" style="fill:#f97316;">Stable</text>
    <rect x="200" y="153" width="68" height="4" fill="#f97316" rx="2"/>
    
    <!-- Row 6 -->
    <text x="20" y="190" class="label">Volume-Flow</text>
    <text x="200" y="190" class="label">66%</text>
    <text x="320" y="190" class="label">1.16</text>
    <text x="430" y="190" class="sub">Volume-price divergence</text>
    <text x="700" y="190" class="label" style="fill:#5c6b9a;">Learning</text>
    <rect x="200" y="180" width="66" height="4" fill="#5c6b9a" rx="2"/>
  </g>

  <!-- Bottom: Live ticker + chart hint -->
  <g transform="translate(120,510)">
    <rect width="960" height="100" class="panel"/>
    <text x="20" y="25" class="title">LIVE HBAR/USD</text>
    <text x="20" y="55" class="big" style="fill:#e2e8f0;">$0.09542</text>
    <text x="20" y="75" class="sub">Updated every 60s via CoinGecko</text>
    
    <!-- Mini sparkline -->
    <polyline points="200,75 220,70 240,72 260,65 280,68 300,62 320,64 340,58 360,60 380,55 400,57 420,52 440,50 460,48 480,45" 
              fill="none" stroke="#00ffa3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="500" y="55" class="label">Last prediction: UP · Confidence: 0.72 · 3 min remaining</text>
    <text x="500" y="75" class="sub">Next swarm vote in 120s · All 6 agents committed</text>
    
    <!-- Consensus indicator -->
    <rect x="820" y="30" width="120" height="50" fill="#0d1a33" stroke="#00ffa3" stroke-width="1" rx="4"/>
    <text x="880" y="48" text-anchor="middle" class="label" style="fill:#00ffa3;">CONSENSUS</text>
    <text x="880" y="66" text-anchor="middle" class="sub">5/6 agents: UP</text>
  </g>
</svg>
