<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <defs>
    <style>
      .bg { fill: #0c1020; }
      .panel { fill: #111633; stroke: #1e2a4a; stroke-width: 1.5; rx: 6; }
      .hero { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 20px; font-weight: 700; fill: #e2e8f0; }
      .title { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 13px; font-weight: 600; fill: #8892b0; }
      .label { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 11px; font-weight: 500; fill: #ccd6f6; }
      .sub { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 9px; fill: #5c6b9a; }
      .big { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 20px; font-weight: 700; fill: #00ffa3; }
    </style>
  </defs>
  <rect width="1000" height="520" class="bg"/>
  <text x="500" y="36" text-anchor="middle" class="hero">Prediction Accuracy Metrics — Token Performance</text>

  <!-- Left: Token accuracy bars -->
  <g transform="translate(60,70)">
    <rect width="480" height="280" class="panel"/>
    <text x="240" y="22" text-anchor="middle" class="title">5-Minute Direction Accuracy by Token</text>
    
    <!-- Bars -->
    <!-- DOVU 100% -->
    <text x="20" y="55" class="label">DOVU</text>
    <rect x="80" y="42" width="300" height="14" fill="#00ffa3" rx="3"/>
    <text x="390" y="52" class="label" style="fill:#00ffa3;">100%</text>
    <text x="80" y="62" class="sub">High liquidity · Clear directional signals</text>
    
    <!-- HBAR 80% -->
    <text x="20" y="95" class="label">HBAR</text>
    <rect x="80" y="82" width="240" height="14" fill="#1e90ff" rx="3"/>
    <text x="330" y="92" class="label" style="fill:#1e90ff;">80%</text>
    <text x="80" y="102" class="sub">Primary model · 14-feature input · High confidence</text>
    
    <!-- SAUCE 68% -->
    <text x="20" y="135" class="label">SAUCE</text>
    <rect x="80" y="122" width="204" height="14" fill="#7c3aed" rx="3"/>
    <text x="294" y="132" class="label" style="fill:#7c3aed;">68%</text>
    <text x="80" y="142" class="sub">Mid-cap · Higher volatility · Growing accuracy</text>
    
    <!-- KARATE 58% -->
    <text x="20" y="175" class="label">KARATE</text>
    <rect x="80" y="162" width="174" height="14" fill="#f97316" rx="3"/>
    <text x="264" y="172" class="label" style="fill:#f97316;">58%</text>
    <text x="80" y="182" class="sub">Low liquidity · Sparse price data · Needs more samples</text>
    
    <!-- CLXY 50% -->
    <text x="20" y="215" class="label">CLXY</text>
    <rect x="80" y="202" width="150" height="14" fill="#ef4444" rx="3"/>
    <text x="240" y="212" class="label" style="fill:#ef4444;">50%</text>
    <text x="80" y="222" class="sub">Nascent token · Limited historical data</text>
    
    <!-- Scale -->
    <line x1="80" y1="245" x2="380" y2="245" stroke="#1e2a4a" stroke-width="0.5"/>
    <text x="80" y="258" class="sub">0%</text>
    <text x="155" y="258" class="sub">25%</text>
    <text x="230" y="258" class="sub">50%</text>
    <text x="305" y="258" class="sub">75%</text>
    <text x="380" y="258" class="sub">100%</text>
  </g>

  <!-- Right: Rolling accuracy history -->
  <g transform="translate(580,70)">
    <rect width="360" height="280" class="panel"/>
    <text x="180" y="22" text-anchor="middle" class="title">HBAR Rolling Accuracy</text>
    
    <!-- Chart area -->
    <g transform="translate(30,40)">
      <line x1="0" y1="180" x2="300" y2="180" stroke="#1e2a4a" stroke-width="0.5"/>
      <line x1="0" y1="135" x2="300" y2="135" stroke="#1e2a4a" stroke-width="0.3"/>
      <line x1="0" y1="90" x2="300" y2="90" stroke="#1e2a4a" stroke-width="0.3"/>
      <line x1="0" y1="45" x2="300" y2="45" stroke="#1e2a4a" stroke-width="0.3"/>
      <line x1="0" y1="0" x2="300" y2="0" stroke="#1e2a4a" stroke-width="0.3"/>
      
      <!-- Y labels -->
      <text x="-8" y="183" text-anchor="end" class="sub">40%</text>
      <text x="-8" y="138" text-anchor="end" class="sub">60%</text>
      <text x="-8" y="93" text-anchor="end" class="sub">70%</text>
      <text x="-8" y="48" text-anchor="end" class="sub">80%</text>
      <text x="-8" y="3" text-anchor="end" class="sub">90%</text>
      
      <!-- Line -->
      <polyline points="0,160 20,155 40,145 60,150 80,140 100,135 120,130 140,125 160,120 180,115 200,110 220,105 240,100 260,95 280,90 300,85" 
                fill="none" stroke="#00ffa3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Dots at ends -->
      <circle cx="0" cy="160" r="3" fill="#1e90ff"/>
      <circle cx="300" cy="85" r="4" fill="#00ffa3"/>
      
      <!-- X labels -->
      <text x="0" y="195" class="sub">Start</text>
      <text x="150" y="195" text-anchor="middle" class="sub">50 predictions</text>
      <text x="300" y="195" text-anchor="end" class="sub">Now</text>
      
      <!-- Improvement badge -->
      <rect x="180" y="10" width="100" height="30" fill="#0d1a33" stroke="#00ffa3" stroke-width="1" rx="4"/>
      <text x="230" y="28" text-anchor="middle" class="label" style="fill:#00ffa3;font-size:10px;">+35 pts improvement</text>
    </g>
  </g>

  <!-- Bottom: 3 metric cards -->
  <g transform="translate(60,380)">
    <rect width="280" height="100" class="panel"/>
    <text x="140" y="28" text-anchor="middle" class="big">80.0%</text>
    <text x="140" y="50" text-anchor="middle" class="label">HBAR Overall Accuracy</text>
    <text x="140" y="70" text-anchor="middle" class="sub">All predictions since inception</text>
    <text x="140" y="86" text-anchor="middle" class="sub">187 correct / 234 total</text>
  </g>
  <g transform="translate(360,380)">
    <rect width="280" height="100" class="panel"/>
    <text x="140" y="28" text-anchor="middle" class="big" style="fill:#1e90ff;">78%</text>
    <text x="140" y="50" text-anchor="middle" class="label">Last 10 Predictions</text>
    <text x="140" y="70" text-anchor="middle" class="sub">Short-term momentum</text>
    <text x="140" y="86" text-anchor="middle" class="sub">8 correct / 10 recent</text>
  </g>
  <g transform="translate(660,380)">
    <rect width="280" height="100" class="panel"/>
    <text x="140" y="28" text-anchor="middle" class="big" style="fill:#7c3aed;">82%</text>
    <text x="140" y="50" text-anchor="middle" class="label">Last 50 Predictions</text>
    <text x="140" y="70" text-anchor="middle" class="sub">Medium-term reliability</text>
    <text x="140" y="86" text-anchor="middle" class="sub">41 correct / 50 recent</text>
  </g>

  <!-- Footer -->
  <text x="500" y="510" text-anchor="middle" class="sub">Adaptive learning continuously adjusts agent weights. Accuracy trends upward as the swarm learns token behavior.</text>
</svg>
