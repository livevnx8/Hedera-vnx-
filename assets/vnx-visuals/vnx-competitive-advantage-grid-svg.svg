<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="580" viewBox="0 0 1100 580">
  <defs>
    <style>
      .bg { fill: #0c1020; }
      .panel { fill: #111633; stroke: #1e2a4a; stroke-width: 1.5; rx: 8; }
      .hero { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 20px; font-weight: 700; fill: #e2e8f0; }
      .title { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 13px; font-weight: 600; fill: #8892b0; }
      .label { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 11px; font-weight: 500; fill: #ccd6f6; }
      .sub { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 9px; fill: #5c6b9a; }
      .check { fill: #00ffa3; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 11px; }
      .cross { fill: #ef4444; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 11px; }
      .partial { fill: #f97316; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 11px; }
    </style>
  </defs>
  <rect width="1100" height="580" class="bg"/>
  <text x="550" y="36" text-anchor="middle" class="hero">VNX vs Alternatives — Feature Matrix</text>

  <!-- Table -->
  <g transform="translate(60,70)">
    <!-- Header row -->
    <rect width="980" height="40" class="panel" style="fill:#0d1530;"/>
    <text x="220" y="26" text-anchor="middle" class="title">Feature</text>
    <text x="420" y="26" text-anchor="middle" class="title">VNX</text>
    <text x="580" y="26" text-anchor="middle" class="title">OpenAI API</text>
    <text x="740" y="26" text-anchor="middle" class="title">Chainlink</text>
    <text x="900" y="26" text-anchor="middle" class="title">Traditional ML</text>

    <!-- Row 1 -->
    <rect y="42" width="980" height="38" class="panel" style="fill:none;stroke:#1e2a4a;stroke-width:0.5;"/>
    <text x="20" y="66" class="label">On-chain proof</text>
    <text x="420" y="66" text-anchor="middle" class="check">✓ HCS-native</text>
    <text x="580" y="66" text-anchor="middle" class="cross">✗ Off-chain only</text>
    <text x="740" y="66" text-anchor="middle" class="partial">◐ Oracle only</text>
    <text x="900" y="66" text-anchor="middle" class="cross">✗ Manual audit</text>

    <!-- Row 2 -->
    <rect y="82" width="980" height="38" class="panel" style="fill:none;stroke:#1e2a4a;stroke-width:0.5;"/>
    <text x="20" y="106" class="label">Model size</text>
    <text x="420" y="106" text-anchor="middle" class="check">✓ 63 KB</text>
    <text x="580" y="106" text-anchor="middle" class="cross">✗ Cloud-only</text>
    <text x="740" y="106" text-anchor="middle" class="cross">✗ N/A</text>
    <text x="900" y="106" text-anchor="middle" class="partial">◐ 10MB–1GB</text>

    <!-- Row 3 -->
    <rect y="122" width="980" height="38" class="panel" style="fill:none;stroke:#1e2a4a;stroke-width:0.5;"/>
    <text x="20" y="146" class="label">Inference speed</text>
    <text x="420" y="146" text-anchor="middle" class="check">✓ 14 μs</text>
    <text x="580" y="146" text-anchor="middle" class="cross">✗ ~200ms</text>
    <text x="740" y="146" text-anchor="middle" class="cross">✗ N/A</text>
    <text x="900" y="146" text-anchor="middle" class="partial">◐ ~1ms</text>

    <!-- Row 4 -->
    <rect y="162" width="980" height="38" class="panel" style="fill:none;stroke:#1e2a4a;stroke-width:0.5;"/>
    <text x="20" y="186" class="label">Multi-agent consensus</text>
    <text x="420" y="186" text-anchor="middle" class="check">✓ 6-agent swarm</text>
    <text x="580" y="186" text-anchor="middle" class="cross">✗ Single model</text>
    <text x="740" y="186" text-anchor="middle" class="cross">✗ N/A</text>
    <text x="900" y="186" text-anchor="middle" class="cross">✗ Single model</text>

    <!-- Row 5 -->
    <rect y="202" width="980" height="38" class="panel" style="fill:none;stroke:#1e2a4a;stroke-width:0.5;"/>
    <text x="20" y="226" class="label">Adaptive learning</text>
    <text x="420" y="226" text-anchor="middle" class="check">✓ Per-agent weights</text>
    <text x="580" y="226" text-anchor="middle" class="cross">✗ Static</text>
    <text x="740" y="226" text-anchor="middle" class="cross">✗ N/A</text>
    <text x="900" y="226" text-anchor="middle" class="cross">✗ Retrain required</text>

    <!-- Row 6 -->
    <rect y="242" width="980" height="38" class="panel" style="fill:none;stroke:#1e2a4a;stroke-width:0.5;"/>
    <text x="20" y="266" class="label">Carbon footprint</text>
    <text x="420" y="266" text-anchor="middle" class="check">✓ 0.000003 kWh/tx</text>
    <text x="580" y="266" text-anchor="middle" class="cross">✗ GPU farms</text>
    <text x="740" y="266" text-anchor="middle" class="partial">◐ PoW-dependent</text>
    <text x="900" y="266" text-anchor="middle" class="partial">◐ CPU only</text>

    <!-- Row 7 -->
    <rect y="282" width="980" height="38" class="panel" style="fill:none;stroke:#1e2a4a;stroke-width:0.5;"/>
    <text x="20" y="306" class="label">Offline capable</text>
    <text x="420" y="306" text-anchor="middle" class="check">✓ Zero API calls</text>
    <text x="580" y="306" text-anchor="middle" class="cross">✗ Internet required</text>
    <text x="740" y="306" text-anchor="middle" class="cross">✗ On-chain only</text>
    <text x="900" y="306" text-anchor="middle" class="check">✓ Local</text>

    <!-- Row 8 -->
    <rect y="322" width="980" height="38" class="panel" style="fill:none;stroke:#1e2a4a;stroke-width:0.5;"/>
    <text x="20" y="346" class="label">Cost per prediction</text>
    <text x="420" y="346" text-anchor="middle" class="check">✓ $0.00001</text>
    <text x="580" y="346" text-anchor="middle" class="cross">✗ $0.002–0.06</text>
    <text x="740" y="346" text-anchor="middle" class="partial">◐ Gas fees</text>
    <text x="900" y="346" text-anchor="middle" class="check">✓ Free (local)</text>

    <!-- Row 9 -->
    <rect y="362" width="980" height="38" class="panel" style="fill:none;stroke:#1e2a4a;stroke-width:0.5;"/>
    <text x="20" y="386" class="label">Fair ordering</text>
    <text x="420" y="386" text-anchor="middle" class="check">✓ Hashgraph median</text>
    <text x="580" y="386" text-anchor="middle" class="cross">✗ Centralized queue</text>
    <text x="740" y="386" text-anchor="middle" class="partial">◐ Block-based</text>
    <text x="900" y="386" text-anchor="middle" class="cross">✗ N/A</text>

    <!-- Row 10 -->
    <rect y="402" width="980" height="38" class="panel" style="fill:none;stroke:#1e2a4a;stroke-width:0.5;"/>
    <text x="20" y="426" class="label">Open source</text>
    <text x="420" y="426" text-anchor="middle" class="check">✓ MIT License</text>
    <text x="580" y="426" text-anchor="middle" class="cross">✗ Proprietary</text>
    <text x="740" y="426" text-anchor="middle" class="partial">◐ Mixed</text>
    <text x="900" y="426" text-anchor="middle" class="partial">◐ Mixed</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60,480)">
    <text x="0" y="0" class="sub">Legend:</text>
    <text x="60" y="0" class="check">✓ Full support</text>
    <text x="180" y="0" class="partial">◐ Partial / conditional</text>
    <text x="340" y="0" class="cross">✗ Not supported</text>
  </g>
</svg>
