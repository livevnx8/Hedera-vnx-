<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg { fill: #0c1020; }
      .panel { fill: #111633; stroke: #1e2a4a; stroke-width: 1.5; rx: 6; }
      .hero { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 20px; font-weight: 700; fill: #e2e8f0; }
      .title { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 13px; font-weight: 600; fill: #8892b0; }
      .label { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 11px; font-weight: 500; fill: #ccd6f6; }
      .sub { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 9px; fill: #5c6b9a; }
      .big { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 24px; font-weight: 700; fill: #00ffa3; }
    </style>
  </defs>
  <rect width="1000" height="500" class="bg"/>
  <text x="500" y="36" text-anchor="middle" class="hero">Sustainability — Carbon-Negative AI by Design</text>

  <!-- Top row: key metrics -->
  <g transform="translate(60,70)">
    <rect width="200" height="110" class="panel"/>
    <text x="100" y="30" text-anchor="middle" class="big">0.000003</text>
    <text x="100" y="52" text-anchor="middle" class="label">kWh per transaction</text>
    <text x="100" y="72" text-anchor="middle" class="sub">UCL Centre for Blockchain</text>
    <text x="100" y="88" text-anchor="middle" class="sub">Technologies — verified</text>
  </g>
  <g transform="translate(290,70)">
    <rect width="200" height="110" class="panel"/>
    <text x="100" y="30" text-anchor="middle" class="big">$0.0001</text>
    <text x="100" y="52" text-anchor="middle" class="label">Per HCS message</text>
    <text x="100" y="72" text-anchor="middle" class="sub">288 proofs/day = &lt;$0.03</text>
    <text x="100" y="88" text-anchor="middle" class="sub">Sustainable at any scale</text>
  </g>
  <g transform="translate(520,70)">
    <rect width="200" height="110" class="panel"/>
    <text x="100" y="30" text-anchor="middle" class="big">14 μs</text>
    <text x="100" y="52" text-anchor="middle" class="label">Inference on CPU</text>
    <text x="100" y="72" text-anchor="middle" class="sub">No GPU, no cloud server</text>
    <text x="100" y="88" text-anchor="middle" class="sub">Watts = idle CPU</text>
  </g>
  <g transform="translate(750,70)">
    <rect width="200" height="110" class="panel"/>
    <text x="100" y="30" text-anchor="middle" class="big">Carbon</text>
    <text x="100" y="52" text-anchor="middle" class="label">Negative network</text>
    <text x="100" y="72" text-anchor="middle" class="sub">Quarterly offsets via</text>
    <text x="100" y="88" text-anchor="middle" class="sub">Terrapass — verified</text>
  </g>

  <!-- Comparison chart -->
  <text x="500" y="230" text-anchor="middle" class="title" style="font-size:14px;">Energy per Transaction — Public Networks (kWh)</text>
  
  <g transform="translate(100,255)">
    <!-- Bars -->
    <rect x="0" y="140" width="70" height="5" fill="#00ffa3" rx="2"/>
    <text x="35" y="135" text-anchor="middle" class="label" style="fill:#00ffa3;font-size:10px;">Hedera</text>
    <text x="35" y="122" text-anchor="middle" class="sub">0.000003</text>

    <rect x="100" y="100" width="70" height="45" fill="#1e90ff" rx="2"/>
    <text x="135" y="92" text-anchor="middle" class="label" style="fill:#1e90ff;font-size:10px;">Visa</text>
    <text x="135" y="80" text-anchor="middle" class="sub">~0.00015</text>

    <rect x="200" y="90" width="70" height="55" fill="#7c3aed" rx="2"/>
    <text x="235" y="82" text-anchor="middle" class="label" style="fill:#7c3aed;font-size:10px;">Solana</text>
    <text x="235" y="70" text-anchor="middle" class="sub">~0.00051</text>

    <rect x="300" y="40" width="70" height="105" fill="#f97316" rx="2"/>
    <text x="335" y="32" text-anchor="middle" class="label" style="fill:#f97316;font-size:10px;">ETH PoS</text>
    <text x="335" y="20" text-anchor="middle" class="sub">~0.0026</text>

    <rect x="400" y="10" width="70" height="135" fill="#ef4444" rx="2"/>
    <text x="435" y="5" text-anchor="middle" class="label" style="fill:#ef4444;font-size:10px;">Bitcoin</text>
    <text x="435" y="-8" text-anchor="middle" class="sub">~500–950</text>

    <!-- Axis -->
    <line x1="0" y1="145" x2="490" y2="145" stroke="#1e2a4a" stroke-width="1"/>
    <text x="0" y="162" class="sub">0</text>
    <text x="490" y="162" class="sub">1000 kWh (log scale implied)</text>
  </g>

  <!-- Bottom note -->
  <text x="500" y="460" text-anchor="middle" class="sub">Sources: UCL Centre for Blockchain Technologies 2023, Hedera Sustainability Report, Visa CSR Data</text>
  <text x="500" y="480" text-anchor="middle" class="sub">VNX model inference adds negligible energy — the Hedera proof is the dominant cost at 0.000003 kWh</text>
</svg>
