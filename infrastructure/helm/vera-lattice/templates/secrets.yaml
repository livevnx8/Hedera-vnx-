apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vera-lattice.fullname" . }}-secrets
  labels:
    {{- include "vera-lattice.labels" . | nindent 4 }}
type: Opaque
stringData:
  hedera-operator-account-id: {{ required "hederaOperatorAccountId is required" .Values.hederaOperatorAccountId | quote }}
  hedera-operator-private-key: {{ required "hederaOperatorPrivateKey is required" .Values.hederaOperatorPrivateKey | quote }}
  openai-api-key: {{ .Values.openaiApiKey | default "" | quote }}
