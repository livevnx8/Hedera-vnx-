events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream=$upstream_addr response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # Connection optimization
    upstream_keepalive_connections 64;
    upstream_keepalive_requests 1000;
    upstream_keepalive_timeout 60s;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=chat:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Load-Balancer "VeraLattice-3Node" always;

    # Upstream with 3 Vera instances - load balancing
    upstream vera_backend {
        least_conn;  # Least connections algorithm
        
        server vera-app-1:8080 weight=1 max_fails=3 fail_timeout=30s;
        server vera-app-2:8080 weight=1 max_fails=3 fail_timeout=30s;
        server vera-app-3:8080 weight=1 max_fails=3 fail_timeout=30s;
        
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # HTTP redirect to HTTPS (production)
    server {
        listen 80;
        server_name veralattice.com www.veralattice.com;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS Load Balancer
    server {
        listen 443 ssl http2;
        server_name veralattice.com www.veralattice.com;

        # SSL configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:MozTLS:10m;
        ssl_session_tickets off;

        # Modern SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Connection limiting
        limit_conn conn 10;

        # Root route
        location / {
            limit_req zone=api burst=100 nodelay;
            proxy_pass http://vera_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Instance-ID $upstream_addr;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
            
            # Health check
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        }

        # API routes
        location /v1/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://vera_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Instance-ID $upstream_addr;
            proxy_read_timeout 300s;
            proxy_next_upstream error timeout http_500 http_502 http_503;
        }

        # Chat endpoint
        location /v1/chat/ {
            limit_req zone=chat burst=20 nodelay;
            proxy_pass http://vera_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # WebSocket support
        location /ws {
            proxy_pass http://vera_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://vera_backend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Health check
        location /health {
            proxy_pass http://vera_backend;
            access_log off;
            proxy_set_header X-Instance-ID $upstream_addr;
        }

        # Metrics (restricted)
        location /metrics {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://vera_backend;
        }
    }

    # Local development load balancer (port 8080)
    server {
        listen 8080;
        server_name localhost;

        location / {
            proxy_pass http://vera_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Instance-ID $upstream_addr;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }

        # Health check with instance info
        location /health {
            proxy_pass http://vera_backend;
            access_log off;
            proxy_set_header X-Instance-ID $upstream_addr;
            add_header X-Load-Balancer-Info "3-instances-active" always;
        }
    }
}
