# Vera OS — nginx reverse proxy for veralattice.com
# Cloudflare tunnel handles TLS termination (veralattice.com → localhost:8761)
# This config runs on port 8761 and routes to backend services.

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=proof:10m rate=5r/s;

upstream vera_api {
    server 127.0.0.1:8080;
    keepalive 16;
}

upstream hcs_bridge {
    server 127.0.0.1:8001;
}

server {
    listen 8761;
    listen [::]:8761;
    server_name veralattice.com www.veralattice.com localhost;

    # Request size limit (1MB max body)
    client_max_body_size 1m;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Vera API (Python FastAPI on 8080) ──
    # Main API routes
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://vera_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 30s;
    }

    # Health endpoint (no rate limit — used by monitors)
    location = /health {
        proxy_pass http://vera_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Prometheus metrics
    location = /metrics {
        proxy_pass http://vera_api/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Monitoring dashboard
    location = /monitoring {
        proxy_pass http://vera_api/monitoring;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proof chain endpoints
    location /proof/ {
        limit_req zone=proof burst=10 nodelay;
        proxy_pass http://vera_api/proof/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Prediction markets
    location /markets {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://vera_api/markets;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Swagger/OpenAPI docs
    location /docs {
        proxy_pass http://vera_api/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://vera_api/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # WebSocket streaming
    location /ws {
        proxy_pass http://vera_api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ── Static Dashboard ──
    location = /v2 {
        return 301 /v2/;
    }

    location = /v2/ {
        root /home/vera-live-0-1/hedera-llm-api;
        try_files /dashboard-v2.html =404;
    }

    location /v2/ {
        alias /home/vera-live-0-1/hedera-llm-api/;
        try_files $uri $uri/ =404;
    }

    location / {
        root /home/vera-live-0-1/hedera-llm-api;
        index dashboard.html;
        try_files $uri $uri/ =404;
    }

    # ── Block sensitive paths ──
    location ~ /\. {
        deny all;
    }
    location ~ \.(env|git|pyc|sqlite)$ {
        deny all;
    }
}
