name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python tests (Vera OS v2 core) ──────────────────────────
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[production]" 2>/dev/null || pip install -e .
          pip install pytest

      - name: Run Python tests
        run: python -m pytest tests/ -v --tb=short

      - name: Verify vera_os version
        run: python -c "import vera_os; assert vera_os.__version__ == '2.0.0', f'Version mismatch: {vera_os.__version__}'"

  # ── Node.js / TypeScript ────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Docker build (smoke test)
        run: docker build -t veralattice:ci .
        if: matrix.node-version == 20
