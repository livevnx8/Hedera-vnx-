<svg xmlns="http://www.w3.org/2000/svg" width="102" height="102" viewBox="0 0 102 102">
  <defs>
    <!-- Outer ring gradient -->
    <linearGradient id="outerRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="25%" stop-color="#0d2137"/>
      <stop offset="50%" stop-color="#1e4a6e"/>
      <stop offset="75%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    
    <!-- Cyan accent gradient -->
    <linearGradient id="cyanAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#00a8cc"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    
    <!-- Inner geometric gradient -->
    <radialGradient id="innerGeo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="60%" stop-color="#143d5c"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </radialGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="102" height="102" fill="#0a1628"/>
  
  <!-- Outer decorative ring -->
  <circle cx="51" cy="51" r="48" fill="none" stroke="url(#outerRing)" stroke-width="2"/>
  <circle cx="51" cy="51" r="45" fill="none" stroke="#143d5c" stroke-width="0.5"/>
  
  <!-- Inner geometric pattern - Flower of Life style -->
  <g transform="translate(51, 51)">
    <!-- Center hexagon -->
    <polygon points="0,-18 15.6,-9 15.6,9 0,18 -15.6,9 -15.6,-9" 
             fill="none" stroke="url(#cyanAccent)" stroke-width="1.5" filter="url(#glow)"/>
    
    <!-- Six overlapping circles forming flower pattern -->
    <g fill="none" stroke="#1e5a82" stroke-width="1" opacity="0.8">
      <circle cx="0" cy="-20" r="20"/>
      <circle cx="17.3" cy="-10" r="20"/>
      <circle cx="17.3" cy="10" r="20"/>
      <circle cx="0" cy="20" r="20"/>
      <circle cx="-17.3" cy="10" r="20"/>
      <circle cx="-17.3" cy="-10" r="20"/>
    </g>
    
    <!-- Intersection points highlighted -->
    <g fill="url(#cyanAccent)" opacity="0.9">
      <circle cx="0" cy="-20" r="2"/>
      <circle cx="17.3" cy="-10" r="2"/>
      <circle cx="17.3" cy="10" r="2"/>
      <circle cx="0" cy="20" r="2"/>
      <circle cx="-17.3" cy="10" r="2"/>
      <circle cx="-17.3" cy="-10" r="2"/>
    </g>
    
    <!-- Inner star/connector lines -->
    <g stroke="url(#cyanAccent)" stroke-width="0.8" opacity="0.6">
      <line x1="0" y1="-18" x2="0" y2="-35"/>
      <line x1="15.6" y1="-9" x2="30.3" y2="-17.5"/>
      <line x1="15.6" y1="9" x2="30.3" y2="17.5"/>
      <line x1="0" y1="18" x2="0" y2="35"/>
      <line x1="-15.6" y1="9" x2="-30.3" y2="17.5"/>
      <line x1="-15.6" y1="-9" x2="-30.3" y2="-17.5"/>
    </g>
    
    <!-- Central core element -->
    <circle cx="0" cy="0" r="6" fill="url(#innerGeo)" stroke="url(#cyanAccent)" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="3" fill="url(#cyanAccent)" opacity="0.8"/>
    
    <!-- Small decorative dots at ring -->
    <g fill="#00d4ff" opacity="0.7">
      <circle cx="0" cy="-42" r="1.2"/>
      <circle cx="36.4" cy="-21" r="1.2"/>
      <circle cx="36.4" cy="21" r="1.2"/>
      <circle cx="0" cy="42" r="1.2"/>
      <circle cx="-36.4" cy="21" r="1.2"/>
      <circle cx="-36.4" cy="-21" r="1.2"/>
    </g>
  </g>
  
  <!-- Outer accent ring segments -->
  <g transform="translate(51, 51)" fill="none" stroke="url(#cyanAccent)" stroke-width="1.5" stroke-linecap="round">
    <path d="M 0,-46 A 46,46 0 0,1 13.5,-44.2" opacity="0.8"/>
    <path d="M 39.8,-23 A 46,46 0 0,1 44.2,-13.5" opacity="0.8"/>
    <path d="M 44.2,13.5 A 46,46 0 0,1 39.8,23" opacity="0.8"/>
    <path d="M 13.5,44.2 A 46,46 0 0,1 0,46" opacity="0.8"/>
    <path d="M -13.5,44.2 A 46,46 0 0,1 -39.8,23" opacity="0.8"/>
    <path d="M -44.2,13.5 A 46,46 0 0,1 -44.2,-13.5" opacity="0.8"/>
    <path d="M -39.8,-23 A 46,46 0 0,1 -13.5,-44.2" opacity="0.8"/>
  </g>
</svg>
