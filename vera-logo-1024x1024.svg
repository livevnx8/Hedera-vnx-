<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Outer ring gradient -->
    <linearGradient id="outerRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="25%" stop-color="#0d2137"/>
      <stop offset="50%" stop-color="#1e4a6e"/>
      <stop offset="75%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    
    <!-- Cyan accent gradient -->
    <linearGradient id="cyanAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#00a8cc"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    
    <!-- Inner geometric gradient -->
    <radialGradient id="innerGeo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="60%" stop-color="#143d5c"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </radialGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="#0a1628"/>
  
  <!-- Outer decorative ring -->
  <circle cx="512" cy="512" r="480" fill="none" stroke="url(#outerRing)" stroke-width="16"/>
  <circle cx="512" cy="512" r="452" fill="none" stroke="#143d5c" stroke-width="4"/>
  
  <!-- Inner geometric pattern - Flower of Life style -->
  <g transform="translate(512, 512)">
    <!-- Center hexagon -->
    <polygon points="0,-180 156,-90 156,90 0,180 -156,90 -156,-90" 
             fill="none" stroke="url(#cyanAccent)" stroke-width="12" filter="url(#glow)"/>
    
    <!-- Six overlapping circles forming flower pattern -->
    <g fill="none" stroke="#1e5a82" stroke-width="8" opacity="0.8">
      <circle cx="0" cy="-200" r="200"/>
      <circle cx="173.2" cy="-100" r="200"/>
      <circle cx="173.2" cy="100" r="200"/>
      <circle cx="0" cy="200" r="200"/>
      <circle cx="-173.2" cy="100" r="200"/>
      <circle cx="-173.2" cy="-100" r="200"/>
    </g>
    
    <!-- Intersection points highlighted -->
    <g fill="url(#cyanAccent)" opacity="0.9">
      <circle cx="0" cy="-200" r="20"/>
      <circle cx="173.2" cy="-100" r="20"/>
      <circle cx="173.2" cy="100" r="20"/>
      <circle cx="0" cy="200" r="20"/>
      <circle cx="-173.2" cy="100" r="20"/>
      <circle cx="-173.2" cy="-100" r="20"/>
    </g>
    
    <!-- Inner star/connector lines -->
    <g stroke="url(#cyanAccent)" stroke-width="6" opacity="0.6">
      <line x1="0" y1="-180" x2="0" y2="-350"/>
      <line x1="156" y1="-90" x2="303" y2="-175"/>
      <line x1="156" y1="90" x2="303" y2="175"/>
      <line x1="0" y1="180" x2="0" y2="350"/>
      <line x1="-156" y1="90" x2="-303" y2="175"/>
      <line x1="-156" y1="-90" x2="-303" y2="-175"/>
    </g>
    
    <!-- Central core element -->
    <circle cx="0" cy="0" r="60" fill="url(#innerGeo)" stroke="url(#cyanAccent)" stroke-width="12" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="30" fill="url(#cyanAccent)" opacity="0.8"/>
    
    <!-- Small decorative dots at ring -->
    <g fill="#00d4ff" opacity="0.7">
      <circle cx="0" cy="-420" r="12"/>
      <circle cx="364" cy="-210" r="12"/>
      <circle cx="364" cy="210" r="12"/>
      <circle cx="0" cy="420" r="12"/>
      <circle cx="-364" cy="210" r="12"/>
      <circle cx="-364" cy="-210" r="12"/>
    </g>
  </g>
  
  <!-- Outer accent ring segments -->
  <g transform="translate(512, 512)" fill="none" stroke="url(#cyanAccent)" stroke-width="12" stroke-linecap="round">
    <path d="M 0,-460 A 460,460 0 0,1 135,-442" opacity="0.8"/>
    <path d="M 398,-230 A 460,460 0 0,1 442,-135" opacity="0.8"/>
    <path d="M 442,135 A 460,460 0 0,1 398,230" opacity="0.8"/>
    <path d="M 135,442 A 460,460 0 0,1 0,460" opacity="0.8"/>
    <path d="M -135,442 A 460,460 0 0,1 -398,230" opacity="0.8"/>
    <path d="M -442,135 A 460,460 0 0,1 -442,-135" opacity="0.8"/>
    <path d="M -398,-230 A 460,460 0 0,1 -135,-442" opacity="0.8"/>
  </g>
</svg>
