
services:
  vera-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_PATH=/app/data/vera.db
      - MODEL_PROVIDER=qvx-direct
      - QVX_INFER_URL=http://qvx-server:5101
      - QVX_INFER_API_KEY=${QVX_INFER_API_KEY}
      - QVX_INFER_MAX_TOKENS=512
      - NATIVE_CONTEXT_SIZE=1024
      - NATIVE_GPU_LAYERS=35
      - HEDERA_NETWORK=mainnet
      - HEDERA_OPERATOR_ACCOUNT_ID=${HEDERA_OPERATOR_ACCOUNT_ID}
      - HEDERA_OPERATOR_PRIVATE_KEY=${HEDERA_OPERATOR_PRIVATE_KEY}
      - MIRROR_NODE_BASE_URL=https://mainnet-public.mirrornode.hedera.com
      - NODE_OPTIONS=--max-old-space-size=122880
      - UV_THREADPOOL_SIZE=128
    volumes:
      - vera_data:/app/data
      - vera_logs:/app/logs
    depends_on:
      - qvx-server
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '8'
        reservations:
          memory: 4G
          cpus: '2'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  qvx-server:
    image: ghcr.io/hedera-qvx/qvx-server:latest
    ports:
      - "5101:5101"
    environment:
      - MODEL_PATH=/models/vera-model.gguf
      - NATIVE_CONTEXT_SIZE=2048
      - NATIVE_GPU_LAYERS=35
      - MAX_BATCH_SIZE=8
      - GPU_MEMORY_UTILIZATION=0.9
    volumes:
      - ./models:/models:ro
      - qvx_cache:/app/cache
    deploy:
      resources:
        limits:
          memory: 32G
          cpus: '16'
        reservations:
          memory: 8G
          cpus: '4'
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5101/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - vera_logs:/var/log/nginx
    depends_on:
      - vera-app
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  block-node:
    image: ghcr.io/hiero-ledger/hiero-block-node:preview
    ports:
      - "8085:8085"
      - "9095:9095"
    volumes:
      - blockstream_data:/data/blocks
      - /mnt/vera-mirror-shards/vera-lattice/blockstream:/data/blocks/host:ro
    environment:
      - NETWORK=mainnet
      - BLOCK_STREAM_PORT=8085
      - STORE_PATH=/data/blocks
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8085"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    restart: unless-stopped

volumes:
  blockstream_data:
    driver: local
  vera_data:
    driver: local
  vera_logs:
    driver: local
  qvx_cache:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    driver: bridge
