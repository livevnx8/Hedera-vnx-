<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Nexus | Flower of Life Graph Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
        }
        .node {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .node:hover {
            filter: drop-shadow(0 0 10px rgba(102, 126, 234, 0.8));
        }
        .link {
            stroke-opacity: 0.6;
            transition: all 0.3s ease;
        }
        .pulse-ring {
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0; }
        }
        .query-editor {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(102, 126, 234, 0.3);
        }
        .glass-panel {
            background: rgba(20, 20, 40, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-white">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="glass-panel border-b border-white/10 px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-blue-500 rounded-xl flex items-center justify-center text-lg font-bold">N</div>
                    <div>
                        <h1 class="text-xl font-semibold">Vera Nexus</h1>
                        <p class="text-xs text-gray-400">Flower of Life Graph Intelligence</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <div class="text-xs text-gray-400">Center Energy</div>
                        <div id="center-energy" class="text-lg font-bold text-purple-400">1.00</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-gray-400">Coherence</div>
                        <div id="coherence" class="text-lg font-bold text-green-400">92%</div>
                    </div>
                    <button onclick="triggerPulse()" class="px-4 py-2 bg-gradient-to-r from-purple-600 to-blue-600 rounded-lg text-sm font-medium hover:opacity-90 transition">
                        ⚡ Pulse
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="flex-1 flex">
            <!-- Left Panel: Graph Visualization -->
            <div class="flex-1 relative">
                <div id="graph-container" class="w-full h-full"></div>
                
                <!-- Graph Controls -->
                <div class="absolute bottom-4 left-4 flex gap-2">
                    <button onclick="resetZoom()" class="px-3 py-2 bg-black/50 rounded-lg text-xs hover:bg-black/70">
                        ⊘ Reset
                    </button>
                    <button onclick="toggleLabels()" class="px-3 py-2 bg-black/50 rounded-lg text-xs hover:bg-black/70">
                        🏷️ Labels
                    </button>
                    <button onclick="toggleForces()" class="px-3 py-2 bg-black/50 rounded-lg text-xs hover:bg-black/70">
        ⏸️ Physics
                    </button>
                </div>
            </div>

            <!-- Right Panel: Query & Info -->
            <div class="w-96 glass-panel border-l border-white/10 flex flex-col">
                <!-- Query Editor -->
                <div class="p-4 border-b border-white/10">
                    <h3 class="text-sm font-medium mb-3 flex items-center gap-2">
                        <span class="w-2 h-2 bg-blue-400 rounded-full"></span>
                        Cypher Query
                    </h3>
                    <textarea 
                        id="query-input" 
                        class="query-editor w-full h-24 rounded-lg p-3 text-xs mono resize-none focus:outline-none focus:border-purple-500"
                        placeholder="MATCH (n:layer1) WHERE n.energy > 0.7 RETURN n"
                    >MATCH (n:layer1) RETURN n</textarea>
                    <div class="flex gap-2 mt-2">
                        <button onclick="executeQuery()" class="flex-1 py-2 bg-purple-600 rounded-lg text-xs font-medium hover:bg-purple-700 transition">
                            ▶ Run Query
                        </button>
                        <button onclick="clearQuery()" class="px-3 py-2 bg-black/50 rounded-lg text-xs hover:bg-black/70">
                            ✕
                        </button>
                    </div>
                </div>

                <!-- Query Results -->
                <div class="flex-1 overflow-auto p-4">
                    <h3 class="text-sm font-medium mb-3">Results</h3>
                    <div id="query-results" class="space-y-2">
                        <div class="text-xs text-gray-400 text-center py-8">
                            Execute a query to see results
                        </div>
                    </div>
                </div>

                <!-- Selected Node Info -->
                <div class="p-4 border-t border-white/10">
                    <h3 class="text-sm font-medium mb-3">Node Details</h3>
                    <div id="node-info" class="text-xs text-gray-400">
                        <p>Click a node to view details</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sacred geometry configuration
        const sacredFreqs = {
            center: 432,
            layer1: 528,
            layer2: 639,
            layer3: 741,
            inner: 963,
            outer: 852,
        };

        // Generate Flower of Life graph data
        function generateGraph() {
            const nodes = [];
            const links = [];

            // Center-0
            nodes.push({
                id: 'center-0',
                type: 'center',
                label: 'Center-0',
                x: 0,
                y: 0,
                r: 25,
                color: '#a78bfa',
                energy: 1.0,
                frequency: sacredFreqs.center,
            });

            // Layer 1 (6 nodes)
            for (let i = 0; i < 6; i++) {
                const angle = (i * 60) * (Math.PI / 180);
                const id = `layer1-${i}`;
                nodes.push({
                    id,
                    type: 'layer1',
                    label: `L1-${i}`,
                    x: Math.cos(angle) * 120,
                    y: Math.sin(angle) * 120,
                    r: 18,
                    color: '#34d399',
                    energy: 0.7,
                    frequency: sacredFreqs.layer1,
                });
                links.push({ source: 'center-0', target: id, type: 'resonance', strength: 0.8 });
            }

            // Layer 2 (12 nodes)
            for (let i = 0; i < 12; i++) {
                const angle = (i * 30) * (Math.PI / 180);
                const id = `layer2-${i}`;
                nodes.push({
                    id,
                    type: 'layer2',
                    label: `L2-${i}`,
                    x: Math.cos(angle) * 220,
                    y: Math.sin(angle) * 220,
                    r: 15,
                    color: '#60a5fa',
                    energy: 0.7,
                    frequency: sacredFreqs.layer2,
                });
                const l1Index = Math.floor(i / 2);
                links.push({ source: `layer1-${l1Index % 6}`, target: id, type: 'flow', strength: 0.6 });
            }

            // Layer 3 (6 nodes)
            for (let i = 0; i < 6; i++) {
                const angle = (i * 60) * (Math.PI / 180);
                const id = `layer3-${i}`;
                nodes.push({
                    id,
                    type: 'layer3',
                    label: `L3-${i}`,
                    x: Math.cos(angle) * 340,
                    y: Math.sin(angle) * 340,
                    r: 12,
                    color: '#fbbf24',
                    energy: 0.7,
                    frequency: sacredFreqs.layer3,
                });
                links.push({ source: `layer2-${i * 2}`, target: id, type: 'harmonic', strength: 0.5 });
                links.push({ source: `layer2-${(i * 2 + 1) % 12}`, target: id, type: 'harmonic', strength: 0.5 });
            }

            // Inner and Outer
            nodes.push({
                id: 'inner-0',
                type: 'inner',
                label: 'Inner',
                x: 0,
                y: -80,
                r: 20,
                color: '#f472b6',
                energy: 0.8,
                frequency: sacredFreqs.inner,
            });
            links.push({ source: 'center-0', target: 'inner-0', type: 'entrainment', strength: 0.9 });

            nodes.push({
                id: 'outer-0',
                type: 'outer',
                label: 'Outer',
                x: 0,
                y: 80,
                r: 20,
                color: '#22d3ee',
                energy: 0.8,
                frequency: sacredFreqs.outer,
            });
            links.push({ source: 'center-0', target: 'outer-0', type: 'entrainment', strength: 0.9 });

            return { nodes, links };
        }

        // Initialize D3 graph
        const { nodes, links } = generateGraph();
        
        const width = document.getElementById('graph-container').clientWidth;
        const height = document.getElementById('graph-container').clientHeight;

        const svg = d3.select('#graph-container')
            .append('svg')
            .attr('width', '100%')
            .attr('height', '100%')
            .attr('viewBox', [-width / 2, -height / 2, width, height]);

        // Add zoom behavior
        const g = svg.append('g');
        
        svg.call(d3.zoom()
            .extent([[0, 0], [width, height]])
            .scaleExtent([0.1, 4])
            .on('zoom', (event) => {
                g.attr('transform', event.transform);
            }));

        // Force simulation
        const simulation = d3.forceSimulation(nodes)
            .force('link', d3.forceLink(links).id(d => d.id).distance(80))
            .force('charge', d3.forceManyBody().strength(-300))
            .force('center', d3.forceCenter(0, 0))
            .force('collision', d3.forceCollide().radius(d => d.r + 10));

        // Draw links
        const link = g.append('g')
            .attr('class', 'links')
            .selectAll('line')
            .data(links)
            .enter()
            .append('line')
            .attr('class', 'link')
            .attr('stroke', d => {
                if (d.type === 'resonance') return '#667eea';
                if (d.type === 'entrainment') return '#a78bfa';
                if (d.type === 'harmonic') return '#fbbf24';
                return '#60a5fa';
            })
            .attr('stroke-width', d => d.strength * 3)
            .attr('stroke-dasharray', d => d.type === 'entrainment' ? '5,5' : null);

        // Draw nodes
        const node = g.append('g')
            .attr('class', 'nodes')
            .selectAll('g')
            .data(nodes)
            .enter()
            .append('g')
            .attr('class', 'node')
            .call(d3.drag()
                .on('start', dragstarted)
                .on('drag', dragged)
                .on('end', dragended))
            .on('click', (event, d) => showNodeInfo(d));

        // Node circles
        node.append('circle')
            .attr('r', d => d.r)
            .attr('fill', d => d.color)
            .attr('opacity', 0.8)
            .attr('stroke', '#fff')
            .attr('stroke-width', 2);

        // Pulse rings for center
        node.filter(d => d.id === 'center-0')
            .append('circle')
            .attr('r', d => d.r)
            .attr('fill', 'none')
            .attr('stroke', d => d.color)
            .attr('stroke-width', 2)
            .attr('class', 'pulse-ring');

        // Labels
        let showLabels = false;
        const labels = node.append('text')
            .text(d => d.label)
            .attr('x', d => d.r + 5)
            .attr('y', 4)
            .attr('font-size', '10px')
            .attr('fill', '#fff')
            .attr('opacity', 0);

        // Update positions
        simulation.on('tick', () => {
            link
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);

            node.attr('transform', d => `translate(${d.x},${d.y})`);
        });

        // Drag functions
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        // Show node info
        function showNodeInfo(d) {
            const info = document.getElementById('node-info');
            info.innerHTML = `
                <div class="space-y-2">
                    <div class="flex justify-between">
                        <span class="text-gray-400">ID:</span>
                        <span class="font-mono text-purple-300">${d.id}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">Type:</span>
                        <span class="capitalize">${d.type}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">Energy:</span>
                        <span class="${d.energy > 0.8 ? 'text-green-400' : 'text-yellow-400'}">${d.energy.toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">Frequency:</span>
                        <span class="font-mono">${d.frequency} Hz</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">Position:</span>
                        <span class="font-mono">(${Math.round(d.x)}, ${Math.round(d.y)})</span>
                    </div>
                </div>
            `;
        }

        // Query execution
        function executeQuery() {
            const query = document.getElementById('query-input').value;
            const results = document.getElementById('query-results');
            
            // Simple query parser
            const typeMatch = query.match(/:(\w+)/);
            const type = typeMatch ? typeMatch[1] : null;
            
            let filtered = nodes;
            if (type) {
                filtered = nodes.filter(n => n.type === type);
            }
            
            results.innerHTML = `
                <div class="text-xs text-gray-400 mb-2">Found ${filtered.length} nodes</div>
                ${filtered.map(n => `
                    <div class="p-2 bg-white/5 rounded-lg hover:bg-white/10 cursor-pointer" onclick="highlightNode('${n.id}')">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full" style="background: ${n.color}"></div>
                            <span class="font-mono text-sm">${n.id}</span>
                            <span class="text-xs text-gray-400">${n.label}</span>
                        </div>
                    </div>
                `).join('')}
            `;
        }

        function clearQuery() {
            document.getElementById('query-input').value = '';
            document.getElementById('query-results').innerHTML = '<div class="text-xs text-gray-400 text-center py-8">Execute a query to see results</div>';
        }

        function highlightNode(id) {
            const n = nodes.find(n => n.id === id);
            if (n) showNodeInfo(n);
        }

        function resetZoom() {
            svg.transition().duration(750).call(
                d3.zoom().transform,
                d3.zoomIdentity
            );
        }

        function toggleLabels() {
            showLabels = !showLabels;
            labels.attr('opacity', showLabels ? 1 : 0);
        }

        let physicsEnabled = true;
        function toggleForces() {
            physicsEnabled = !physicsEnabled;
            if (physicsEnabled) {
                simulation.alpha(0.3).restart();
            } else {
                simulation.stop();
            }
        }

        function triggerPulse() {
            // Visual pulse effect
            node.filter(d => d.id === 'center-0')
                .select('circle')
                .transition()
                .duration(500)
                .attr('r', 40)
                .transition()
                .duration(500)
                .attr('r', d => d.r);
            
            // Propagate to neighbors
            setTimeout(() => {
                node.filter(d => d.type === 'layer1')
                    .select('circle')
                    .transition()
                    .duration(300)
                    .attr('opacity', 1)
                    .transition()
                    .duration(300)
                    .attr('opacity', 0.8);
            }, 200);
        }

        // Initial stats
        document.getElementById('center-energy').textContent = '1.00';
        document.getElementById('coherence').textContent = '92%';
    </script>
</body>
</html>
