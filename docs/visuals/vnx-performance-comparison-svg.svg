<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="550" viewBox="0 0 1000 550">
  <defs>
    <style>
      .bg { fill: #0c1020; }
      .panel { fill: #111633; stroke: #1e2a4a; stroke-width: 1.5; rx: 6; }
      .hero { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 20px; font-weight: 700; fill: #e2e8f0; }
      .title { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 13px; font-weight: 600; fill: #8892b0; }
      .label { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 11px; font-weight: 500; fill: #ccd6f6; }
      .sub { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 9px; fill: #5c6b9a; }
      .barlabel { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 10px; font-weight: 600; fill: #0c1020; }
    </style>
  </defs>
  <rect width="1000" height="550" class="bg"/>
  <text x="500" y="36" text-anchor="middle" class="hero">Inference Performance — BitLattice vs Traditional Models</text>
  <text x="500" y="60" text-anchor="middle" class="sub">Lower is better · All times measured on AMD Ryzen 9 5900X, single thread</text>

  <!-- Latency chart -->
  <text x="80" y="95" class="title">Latency (μs) — Single Prediction</text>
  
  <g transform="translate(80,110)">
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="420" y2="0" stroke="#1e2a4a" stroke-width="0.5"/>
    <line x1="0" y1="30" x2="420" y2="30" stroke="#1e2a4a" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="420" y2="60" stroke="#1e2a4a" stroke-width="0.5"/>
    <line x1="0" y1="90" x2="420" y2="90" stroke="#1e2a4a" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="420" y2="120" stroke="#1e2a4a" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="420" y2="150" stroke="#1e2a4a" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="420" y2="180" stroke="#1e2a4a" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="420" y2="210" stroke="#1e2a4a" stroke-width="0.5"/>
    
    <!-- BitLattice bar (14μs) -->
    <rect x="0" y="205" width="3" height="5" fill="#00ffa3" rx="2"/>
    <text x="12" y="210" class="label">BitLattice</text>
    <text x="12" y="222" class="sub">14 μs</text>
    
    <!-- scikit-learn (85μs) -->
    <rect x="0" y="175" width="18" height="5" fill="#1e90ff" rx="2"/>
    <text x="24" y="180" class="label">scikit-learn (SGD)</text>
    <text x="24" y="192" class="sub">85 μs</text>
    
    <!-- PyTorch CPU (320μs) -->
    <rect x="0" y="145" width="66" height="5" fill="#f97316" rx="2"/>
    <text x="72" y="150" class="label">PyTorch CPU (MLP)</text>
    <text x="72" y="162" class="sub">320 μs</text>
    
    <!-- ONNX Runtime (120μs) -->
    <rect x="0" y="115" width="25" height="5" fill="#7c3aed" rx="2"/>
    <text x="31" y="120" class="label">ONNX Runtime (float32)</text>
    <text x="31" y="132" class="sub">120 μs</text>
    
    <!-- GPT-2 inference (25000μs) -->
    <rect x="0" y="85" width="420" height="5" fill="#ef4444" rx="2"/>
    <text x="0" y="80" class="label">GPT-2 (124M params)</text>
    <text x="0" y="68" class="sub">25,000 μs (25ms) — truncated to fit</text>
    
    <!-- X-axis labels -->
    <text x="0" y="235" class="sub">0 μs</text>
    <text x="105" y="235" class="sub">500 μs</text>
    <text x="210" y="235" class="sub">1000 μs</text>
    <text x="315" y="235" class="sub">1500 μs</text>
    <text x="420" y="235" class="sub">2000 μs+</text>
    
    <!-- Speedup badge -->
    <g transform="translate(280,150)">
      <rect width="130" height="50" fill="#111633" stroke="#00ffa3" stroke-width="1.5" rx="6"/>
      <text x="65" y="20" text-anchor="middle" class="title" style="fill:#00ffa3;">6.23× FASTER</text>
      <text x="65" y="38" text-anchor="middle" class="sub">than ONNX float32</text>
    </g>
  </g>

  <!-- Right: Throughput -->
  <text x="580" y="95" class="title">Throughput (predictions / second)</text>
  
  <g transform="translate(580,110)">
    <!-- Background panel -->
    <rect width="340" height="130" class="panel" style="fill:none;stroke:#1e2a4a;"/>
    
    <!-- BitLattice -->
    <rect x="20" y="20" width="280" height="18" fill="#00ffa3" rx="3"/>
    <text x="30" y="32" class="barlabel">71,400 / sec</text>
    <text x="310" y="32" class="label" style="text-anchor:end;">BitLattice</text>
    
    <!-- ONNX float32 -->
    <rect x="20" y="48" width="45" height="18" fill="#7c3aed" rx="3"/>
    <text x="30" y="60" class="barlabel">8,300 / sec</text>
    <text x="75" y="60" class="label">ONNX float32</text>
    
    <!-- scikit-learn -->
    <rect x="20" y="76" width="35" height="18" fill="#1e90ff" rx="3"/>
    <text x="30" y="88" class="barlabel">11,700 / sec</text>
    <text x="65" y="88" class="label">scikit-learn</text>
    
    <!-- PyTorch CPU -->
    <rect x="20" y="104" width="12" height="18" fill="#f97316" rx="3"/>
    <text x="30" y="116" class="barlabel">3,100 / sec</text>
    <text x="42" y="116" class="label">PyTorch CPU</text>
  </g>

  <!-- Bottom: Key metrics grid -->
  <text x="500" y="310" text-anchor="middle" class="title" style="font-size:14px;">Why BitLattice Wins</text>

  <g transform="translate(60,340)">
    <rect width="200" height="80" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="label" style="fill:#00ffa3;font-size:14px;">14 μs</text>
    <text x="100" y="50" text-anchor="middle" class="label">Inference latency</text>
    <text x="100" y="68" text-anchor="middle" class="sub">CPU L1 cache hit, zero GPU</text>
  </g>
  <g transform="translate(290,340)">
    <rect width="200" height="80" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="label" style="fill:#1e90ff;font-size:14px;">63 KB</text>
    <text x="100" y="50" text-anchor="middle" class="label">Model size</text>
    <text x="100" y="68" text-anchor="middle" class="sub">5 weights per byte (ternary)</text>
  </g>
  <g transform="translate(520,340)">
    <rect width="200" height="80" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="label" style="fill:#7c3aed;font-size:14px;">200,000×</text>
    <text x="100" y="50" text-anchor="middle" class="label">Compression vs GPT-class</text>
    <text x="100" y="68" text-anchor="middle" class="sub">Same accuracy, tiny footprint</text>
  </g>
  <g transform="translate(750,340)">
    <rect width="200" height="80" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="label" style="fill:#f97316;font-size:14px;">Zero</text>
    <text x="100" y="50" text-anchor="middle" class="label">External API calls</text>
    <text x="100" y="68" text-anchor="middle" class="sub">Fully local, fully offline capable</text>
  </g>

  <!-- Bottom note -->
  <text x="500" y="470" text-anchor="middle" class="sub">Benchmarked on AMD Ryzen 9 5900X · Python 3.12 · ONNX Runtime 1.17 · Single thread</text>
  <text x="500" y="490" text-anchor="middle" class="sub">BitLattice v3 · Ternary weights {-1, 0, +1} · 14 input features · Binary classification</text>
</svg>
