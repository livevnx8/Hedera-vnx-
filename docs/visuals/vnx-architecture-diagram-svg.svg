<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .bg { fill: #0c1020; }
      .panel { fill: #111633; stroke: #1e2a4a; stroke-width: 1.5; rx: 8; }
      .title { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 13px; font-weight: 600; fill: #8892b0; }
      .label { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 11px; font-weight: 500; fill: #ccd6f6; }
      .sub { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 9px; fill: #5c6b9a; }
      .arrow { stroke: #1e90ff; stroke-width: 2; fill: none; marker-end: url(#ah); }
      .hcs { stroke: #00ffa3; }
      .violet { stroke: #7c3aed; }
      .orange { stroke: #f97316; }
      .hero { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 22px; font-weight: 700; fill: #e2e8f0; }
    </style>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e90ff"/>
    </marker>
    <marker id="ahg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ffa3"/>
    </marker>
  </defs>
  <rect width="1200" height="700" class="bg"/>
  <text x="600" y="38" text-anchor="middle" class="hero">VNX Architecture — 7 Layer Verifiable AI Stack</text>

  <!-- Layer 1 -->
  <g transform="translate(60,70)">
    <rect width="140" height="80" class="panel"/>
    <text x="70" y="22" text-anchor="middle" class="title">LAYER 1</text>
    <text x="70" y="42" text-anchor="middle" class="label">Hedera Core</text>
    <text x="70" y="58" text-anchor="middle" class="sub">HCS · HTS · HBAR</text>
    <text x="70" y="72" text-anchor="middle" class="sub">&lt; 5s finality</text>
  </g>

  <!-- Layer 2 -->
  <g transform="translate(220,70)">
    <rect width="140" height="80" class="panel"/>
    <text x="70" y="22" text-anchor="middle" class="title">LAYER 2</text>
    <text x="70" y="42" text-anchor="middle" class="label">BitLattice ONNX</text>
    <text x="70" y="58" text-anchor="middle" class="sub">63KB · 14μs inference</text>
    <text x="70" y="72" text-anchor="middle" class="sub">6.23× speedup</text>
  </g>

  <!-- Layer 3 -->
  <g transform="translate(380,70)">
    <rect width="140" height="80" class="panel"/>
    <text x="70" y="22" text-anchor="middle" class="title">LAYER 3</text>
    <text x="70" y="42" text-anchor="middle" class="label">Agent Swarm</text>
    <text x="70" y="58" text-anchor="middle" class="sub">6 agents · consensus</text>
    <text x="70" y="72" text-anchor="middle" class="sub">Adaptive weights</text>
  </g>

  <!-- Layer 4 -->
  <g transform="translate(540,70)">
    <rect width="140" height="80" class="panel"/>
    <text x="70" y="22" text-anchor="middle" class="title">LAYER 4</text>
    <text x="70" y="42" text-anchor="middle" class="label">Marketplace</text>
    <text x="70" y="58" text-anchor="middle" class="sub">Post → Bid → Execute</text>
    <text x="70" y="72" text-anchor="middle" class="sub">Escrow + Reputation</text>
  </g>

  <!-- Layer 5 -->
  <g transform="translate(700,70)">
    <rect width="140" height="80" class="panel"/>
    <text x="70" y="22" text-anchor="middle" class="title">LAYER 5</text>
    <text x="70" y="42" text-anchor="middle" class="label">Live Proof Loop</text>
    <text x="70" y="58" text-anchor="middle" class="sub">Hash chain · HCS emit</text>
    <text x="70" y="72" text-anchor="middle" class="sub">Mirror verify</text>
  </g>

  <!-- Layer 6 -->
  <g transform="translate(860,70)">
    <rect width="140" height="80" class="panel"/>
    <text x="70" y="22" text-anchor="middle" class="title">LAYER 6</text>
    <text x="70" y="42" text-anchor="middle" class="label">Verifiable AI</text>
    <text x="70" y="58" text-anchor="middle" class="sub">8 first-party agents</text>
    <text x="70" y="72" text-anchor="middle" class="sub">ZK-ready proofs</text>
  </g>

  <!-- Layer 7 -->
  <g transform="translate(1020,70)">
    <rect width="120" height="80" class="panel"/>
    <text x="60" y="22" text-anchor="middle" class="title">LAYER 7</text>
    <text x="60" y="42" text-anchor="middle" class="label">Learning Lane</text>
    <text x="60" y="58" text-anchor="middle" class="sub">Proofs → Lessons</text>
    <text x="60" y="72" text-anchor="middle" class="sub">→ Upgrade pkgs</text>
  </g>

  <!-- Horizontal arrows between layers -->
  <line x1="200" y1="110" x2="220" y2="110" class="arrow"/>
  <line x1="360" y1="110" x2="380" y2="110" class="arrow"/>
  <line x1="520" y1="110" x2="540" y2="110" class="arrow"/>
  <line x1="680" y1="110" x2="700" y2="110" class="arrow"/>
  <line x1="840" y1="110" x2="860" y2="110" class="arrow"/>
  <line x1="1000" y1="110" x2="1020" y2="110" class="arrow"/>

  <!-- Bottom section: Marketplace Loop -->
  <text x="600" y="210" text-anchor="middle" class="hero" style="font-size:16px;fill:#8892b0;">Marketplace Execution Loop</text>

  <!-- Steps -->
  <g transform="translate(100,240)">
    <rect width="160" height="90" class="panel"/>
    <text x="80" y="28" text-anchor="middle" class="title" style="fill:#1e90ff;">1. POST</text>
    <text x="80" y="50" text-anchor="middle" class="label">Task created on HCS</text>
    <text x="80" y="68" text-anchor="middle" class="sub">Parameters + reward HBAR</text>
    <text x="80" y="82" text-anchor="middle" class="sub">Immutable timestamp</text>
  </g>

  <g transform="translate(300,240)">
    <rect width="160" height="90" class="panel"/>
    <text x="80" y="28" text-anchor="middle" class="title" style="fill:#f97316;">2. BID</text>
    <text x="80" y="50" text-anchor="middle" class="label">Agents compete</text>
    <text x="80" y="68" text-anchor="middle" class="sub">Reputation score filters</text>
    <text x="80" y="82" text-anchor="middle" class="sub">Top-N selected</text>
  </g>

  <g transform="translate(500,240)">
    <rect width="160" height="90" class="panel"/>
    <text x="80" y="28" text-anchor="middle" class="title" style="fill:#7c3aed;">3. EXECUTE</text>
    <text x="80" y="50" text-anchor="middle" class="label">Swarm consensus</text>
    <text x="80" y="68" text-anchor="middle" class="sub">BitLattice inference</text>
    <text x="80" y="82" text-anchor="middle" class="sub">All agents sign result</text>
  </g>

  <g transform="translate(700,240)">
    <rect width="160" height="90" class="panel"/>
    <text x="80" y="28" text-anchor="middle" class="title" style="fill:#00ffa3;">4. SETTLE</text>
    <text x="80" y="50" text-anchor="middle" class="label">Escrow release</text>
    <text x="80" y="68" text-anchor="middle" class="sub">Accurate agents paid</text>
    <text x="80" y="82" text-anchor="middle" class="sub">Reputation updated</text>
  </g>

  <g transform="translate(900,240)">
    <rect width="160" height="90" class="panel"/>
    <text x="80" y="28" text-anchor="middle" class="title" style="fill:#1e90ff;">5. PROVE</text>
    <text x="80" y="50" text-anchor="middle" class="label">HCS proof emitted</text>
    <text x="80" y="68" text-anchor="middle" class="sub">Hash chained + verified</text>
    <text x="80" y="82" text-anchor="middle" class="sub">Tamper-proof forever</text>
  </g>

  <!-- Arrows between steps -->
  <line x1="260" y1="285" x2="300" y2="285" class="arrow"/>
  <line x1="460" y1="285" x2="500" y2="285" class="arrow"/>
  <line x1="660" y1="285" x2="700" y2="285" class="arrow"/>
  <line x1="860" y1="285" x2="900" y2="285" class="arrow"/>

  <!-- Feedback loop -->
  <path d="M 1060 285 C 1120 285, 1120 400, 600 400 C 80 400, 80 330, 100 330" 
        stroke="#00ffa3" stroke-width="2" fill="none" marker-end="url(#ahg)" stroke-dasharray="6,4"/>
  <text x="600" y="420" text-anchor="middle" class="sub" style="fill:#00ffa3;">Feedback: Proof → Learning Lane → Model upgrade</text>

  <!-- Bottom stats row -->
  <g transform="translate(60,480)">
    <rect width="200" height="80" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="title">163 API ROUTES</text>
    <text x="100" y="50" text-anchor="middle" class="label">REST + WebSocket</text>
    <text x="100" y="68" text-anchor="middle" class="sub">FastAPI · OpenAPI spec</text>
  </g>
  <g transform="translate(290,480)">
    <rect width="200" height="80" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="title">38 ACTIVE AGENTS</text>
    <text x="100" y="50" text-anchor="middle" class="label">6 prediction + 32 workflow</text>
    <text x="100" y="68" text-anchor="middle" class="sub">Auto-discovery via HCS</text>
  </g>
  <g transform="translate(520,480)">
    <rect width="200" height="80" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="title">98 TESTS</text>
    <text x="100" y="50" text-anchor="middle" class="label">&lt; 3s full suite</text>
    <text x="100" y="68" text-anchor="middle" class="sub">pytest · CI-ready</text>
  </g>
  <g transform="translate(750,480)">
    <rect width="200" height="80" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="title">MIT LICENSED</text>
    <text x="100" y="50" text-anchor="middle" class="label">Open source · Zero lock-in</text>
    <text x="100" y="68" text-anchor="middle" class="sub">Run anywhere</text>
  </g>
  <g transform="translate(980,480)">
    <rect width="160" height="80" class="panel"/>
    <text x="80" y="28" text-anchor="middle" class="title">0.000003 kWh/tx</text>
    <text x="80" y="50" text-anchor="middle" class="label">Carbon-negative chain</text>
    <text x="80" y="68" text-anchor="middle" class="sub">UCL verified</text>
  </g>

  <!-- Footer -->
  <text x="600" y="620" text-anchor="middle" class="sub">Every layer emits HCS proofs — independently verifiable by any mirror node</text>
</svg>
