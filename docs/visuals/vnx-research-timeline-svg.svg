<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="480" viewBox="0 0 1100 480">
  <defs>
    <style>
      .bg { fill: #0c1020; }
      .panel { fill: #111633; stroke: #1e2a4a; stroke-width: 1.5; rx: 6; }
      .hero { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 20px; font-weight: 700; fill: #e2e8f0; }
      .title { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 13px; font-weight: 600; fill: #8892b0; }
      .label { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 11px; font-weight: 500; fill: #ccd6f6; }
      .sub { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 9px; fill: #5c6b9a; }
      .year { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 12px; font-weight: 700; fill: #00ffa3; }
      .dot { fill: #00ffa3; stroke: #0c1020; stroke-width: 2; }
      .dotb { fill: #1e90ff; stroke: #0c1020; stroke-width: 2; }
      .dotv { fill: #7c3aed; stroke: #0c1020; stroke-width: 2; }
      .doto { fill: #f97316; stroke: #0c1020; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1100" height="480" class="bg"/>
  <text x="550" y="36" text-anchor="middle" class="hero">VNX Research &amp; Development Timeline</text>

  <!-- Timeline line -->
  <line x1="80" y1="100" x2="1020" y2="100" stroke="#1e2a4a" stroke-width="2"/>

  <!-- Milestones -->
  <!-- Q1 2024 -->
  <g transform="translate(80,100)">
    <circle cx="0" cy="0" r="7" class="dot"/>
    <line x1="0" y1="7" x2="0" y2="30" stroke="#00ffa3" stroke-width="1.5"/>
    <rect x="-70" y="32" width="140" height="75" class="panel"/>
    <text x="0" y="50" text-anchor="middle" class="year">Q1 2024</text>
    <text x="0" y="68" text-anchor="middle" class="label">BitLattice v1</text>
    <text x="0" y="84" text-anchor="middle" class="sub">Ternary weight proof</text>
    <text x="0" y="98" text-anchor="middle" class="sub">of concept</text>
  </g>

  <!-- Q2 2024 -->
  <g transform="translate(220,100)">
    <circle cx="0" cy="0" r="7" class="dotb"/>
    <line x1="0" y1="7" x2="0" y2="30" stroke="#1e90ff" stroke-width="1.5"/>
    <rect x="-70" y="32" width="140" height="75" class="panel"/>
    <text x="0" y="50" text-anchor="middle" class="year" style="fill:#1e90ff;">Q2 2024</text>
    <text x="0" y="68" text-anchor="middle" class="label">HCS Integration</text>
    <text x="0" y="84" text-anchor="middle" class="sub">Proof-of-every-prediction</text>
    <text x="0" y="98" text-anchor="middle" class="sub">on testnet</text>
  </g>

  <!-- Q3 2024 -->
  <g transform="translate(360,100)">
    <circle cx="0" cy="0" r="7" class="dotv"/>
    <line x1="0" y1="7" x2="0" y2="30" stroke="#7c3aed" stroke-width="1.5"/>
    <rect x="-70" y="32" width="140" height="75" class="panel"/>
    <text x="0" y="50" text-anchor="middle" class="year" style="fill:#7c3aed;">Q3 2024</text>
    <text x="0" y="68" text-anchor="middle" class="label">Agent Swarm v1</text>
    <text x="0" y="84" text-anchor="middle" class="sub">3 agents + consensus</text>
    <text x="0" y="98" text-anchor="middle" class="sub">weighted voting</text>
  </g>

  <!-- Q4 2024 -->
  <g transform="translate(500,100)">
    <circle cx="0" cy="0" r="7" class="doto"/>
    <line x1="0" y1="7" x2="0" y2="30" stroke="#f97316" stroke-width="1.5"/>
    <rect x="-70" y="32" width="140" height="75" class="panel"/>
    <text x="0" y="50" text-anchor="middle" class="year" style="fill:#f97316;">Q4 2024</text>
    <text x="0" y="68" text-anchor="middle" class="label">Marketplace MVP</text>
    <text x="0" y="84" text-anchor="middle" class="sub">Post → Bid → Execute</text>
    <text x="0" y="98" text-anchor="middle" class="sub">→ Settle loop</text>
  </g>

  <!-- Q1 2025 -->
  <g transform="translate(640,100)">
    <circle cx="0" cy="0" r="7" class="dot"/>
    <line x1="0" y1="7" x2="0" y2="30" stroke="#00ffa3" stroke-width="1.5"/>
    <rect x="-70" y="32" width="140" height="75" class="panel"/>
    <text x="0" y="50" text-anchor="middle" class="year">Q1 2025</text>
    <text x="0" y="68" text-anchor="middle" class="label">BitLattice v2</text>
    <text x="0" y="84" text-anchor="middle" class="sub">ONNX export +</text>
    <text x="0" y="98" text-anchor="middle" class="sub">quantization</text>
  </g>

  <!-- Q2 2025 -->
  <g transform="translate(780,100)">
    <circle cx="0" cy="0" r="7" class="dotb"/>
    <line x1="0" y1="7" x2="0" y2="30" stroke="#1e90ff" stroke-width="1.5"/>
    <rect x="-70" y="32" width="140" height="75" class="panel"/>
    <text x="0" y="50" text-anchor="middle" class="year" style="fill:#1e90ff;">Q2 2025</text>
    <text x="0" y="68" text-anchor="middle" class="label">6-Agent Swarm</text>
    <text x="0" y="84" text-anchor="middle" class="sub">Adaptive weights +</text>
    <text x="0" y="98" text-anchor="middle" class="sub">5-min prediction cycle</text>
  </g>

  <!-- Q3 2025 -->
  <g transform="translate(920,100)">
    <circle cx="0" cy="0" r="7" class="dotv"/>
    <line x1="0" y1="7" x2="0" y2="30" stroke="#7c3aed" stroke-width="1.5"/>
    <rect x="-70" y="32" width="140" height="75" class="panel"/>
    <text x="0" y="50" text-anchor="middle" class="year" style="fill:#7c3aed;">Q3 2025</text>
    <text x="0" y="68" text-anchor="middle" class="label">BitLattice v3</text>
    <text x="0" y="84" text-anchor="middle" class="sub">6.23× speedup ·</text>
    <text x="0" y="98" text-anchor="middle" class="sub">63 KB production</text>
  </g>

  <!-- Future -->
  <g transform="translate(1060,100)">
    <circle cx="0" cy="0" r="7" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="0" y1="7" x2="0" y2="30" stroke="#f97316" stroke-width="1.5" stroke-dasharray="3,2"/>
    <rect x="-70" y="32" width="140" height="75" class="panel"/>
    <text x="0" y="50" text-anchor="middle" class="year" style="fill:#f97316;">2026</text>
    <text x="0" y="68" text-anchor="middle" class="label">DAO Governance</text>
    <text x="0" y="84" text-anchor="middle" class="sub">On-chain voting for</text>
    <text x="0" y="98" text-anchor="middle" class="sub">agent upgrades</text>
  </g>

  <!-- Bottom: Key achievements -->
  <text x="550" y="250" text-anchor="middle" class="title" style="font-size:14px;">Key Technical Milestones</text>

  <g transform="translate(60,280)">
    <rect width="200" height="70" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="label" style="fill:#00ffa3;">98 Tests Passing</text>
    <text x="100" y="48" text-anchor="middle" class="sub">&lt; 3 second CI suite</text>
    <text x="100" y="62" text-anchor="middle" class="sub">pytest + GitHub Actions</text>
  </g>
  <g transform="translate(290,280)">
    <rect width="200" height="70" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="label" style="fill:#1e90ff;">163 API Routes</text>
    <text x="100" y="48" text-anchor="middle" class="sub">REST + WebSocket</text>
    <text x="100" y="62" text-anchor="middle" class="sub">FastAPI + OpenAPI</text>
  </g>
  <g transform="translate(520,280)">
    <rect width="200" height="70" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="label" style="fill:#7c3aed;">38 Active Agents</text>
    <text x="100" y="48" text-anchor="middle" class="sub">6 prediction + 32 workflow</text>
    <text x="100" y="62" text-anchor="middle" class="sub">Auto-discovery via HCS</text>
  </g>
  <g transform="translate(750,280)">
    <rect width="200" height="70" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="label" style="fill:#f97316;">MIT Licensed</text>
    <text x="100" y="48" text-anchor="middle" class="sub">Zero vendor lock-in</text>
    <text x="100" y="62" text-anchor="middle" class="sub">Run anywhere, audit freely</text>
  </g>

  <!-- Bottom note -->
  <text x="550" y="400" text-anchor="middle" class="sub">Every milestone is HCS-proven. Query any prediction by hash on any Hedera mirror node.</text>
</svg>
