<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="550" viewBox="0 0 1200 550">
  <defs>
    <style>
      .bg { fill: #0c1020; }
      .panel { fill: #111633; stroke: #1e2a4a; stroke-width: 1.5; rx: 6; }
      .hashbox { fill: #0d1a33; stroke: #1e90ff; stroke-width: 1; rx: 4; }
      .title { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 13px; font-weight: 600; fill: #8892b0; }
      .label { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 11px; font-weight: 500; fill: #ccd6f6; }
      .sub { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 9px; fill: #5c6b9a; }
      .hash { font-family: "Courier New",monospace; font-size: 8px; fill: #1e90ff; }
      .hero { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 20px; font-weight: 700; fill: #e2e8f0; }
      .arrow { stroke: #00ffa3; stroke-width: 2; fill: none; marker-end: url(#ahg); }
      .darrow { stroke: #1e90ff; stroke-width: 1.5; fill: none; stroke-dasharray: 4,3; }
    </style>
    <marker id="ahg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ffa3"/>
    </marker>
  </defs>
  <rect width="1200" height="550" class="bg"/>
  <text x="600" y="36" text-anchor="middle" class="hero">VNX Verifiability Pipeline — Every Step Anchored to Hedera</text>

  <!-- Step 1: Inference -->
  <g transform="translate(60,80)">
    <rect width="180" height="100" class="panel"/>
    <text x="90" y="25" text-anchor="middle" class="title" style="fill:#1e90ff;">1. INFERENCE</text>
    <text x="90" y="48" text-anchor="middle" class="label">BitLattice + 6 agents</text>
    <text x="90" y="66" text-anchor="middle" class="sub">Weighted consensus vote</text>
    <text x="90" y="84" text-anchor="middle" class="sub">Timestamp: Unix nanos</text>
  </g>

  <!-- Step 2: Hash -->
  <g transform="translate(290,80)">
    <rect width="180" height="100" class="panel"/>
    <text x="90" y="25" text-anchor="middle" class="title" style="fill:#f97316;">2. HASH</text>
    <text x="90" y="48" text-anchor="middle" class="label">SHA-256(prediction)</text>
    <text x="90" y="66" text-anchor="middle" class="sub">Includes direction + conf</text>
    <text x="90" y="84" text-anchor="middle" class="sub">+ previous hash (chain)</text>
  </g>

  <!-- Step 3: HCS Emit -->
  <g transform="translate(520,80)">
    <rect width="180" height="100" class="panel"/>
    <text x="90" y="25" text-anchor="middle" class="title" style="fill:#7c3aed;">3. HCS EMIT</text>
    <text x="90" y="48" text-anchor="middle" class="label">Submit to Consensus Service</text>
    <text x="90" y="66" text-anchor="middle" class="sub">Topic ID: 0.0.xxxxx</text>
    <text x="90" y="84" text-anchor="middle" class="sub">&lt; 5s finality guarantee</text>
  </g>

  <!-- Step 4: Mirror Verify -->
  <g transform="translate(750,80)">
    <rect width="180" height="100" class="panel"/>
    <text x="90" y="25" text-anchor="middle" class="title" style="fill:#00ffa3;">4. VERIFY</text>
    <text x="90" y="48" text-anchor="middle" class="label">Mirror node query</text>
    <text x="90" y="66" text-anchor="middle" class="sub">Match hash → seq → timestamp</text>
    <text x="90" y="84" text-anchor="middle" class="sub">Third-party audit ready</text>
  </g>

  <!-- Step 5: Score -->
  <g transform="translate(980,80)">
    <rect width="160" height="100" class="panel"/>
    <text x="80" y="25" text-anchor="middle" class="title" style="fill:#1e90ff;">5. SCORE</text>
    <text x="80" y="48" text-anchor="middle" class="label">5-min reality check</text>
    <text x="80" y="66" text-anchor="middle" class="sub">Actual vs predicted direction</text>
    <text x="80" y="84" text-anchor="middle" class="sub">Agent weights updated</text>
  </g>

  <!-- Arrows -->
  <line x1="240" y1="130" x2="290" y2="130" class="arrow"/>
  <line x1="470" y1="130" x2="520" y2="130" class="arrow"/>
  <line x1="700" y1="130" x2="750" y2="130" class="arrow"/>
  <line x1="930" y1="130" x2="980" y2="130" class="arrow"/>

  <!-- Hash chain visualization -->
  <text x="600" y="240" text-anchor="middle" class="title" style="font-size:14px;">Cryptographic Hash Chain on HCS</text>

  <g transform="translate(80,270)">
    <rect width="170" height="70" class="hashbox"/>
    <text x="85" y="22" text-anchor="middle" class="label">Block N</text>
    <text x="85" y="38" text-anchor="middle" class="hash">hash: a3f2...e7d1</text>
    <text x="85" y="54" text-anchor="middle" class="sub">seq: 48291 · ts: 1715...</text>
    <text x="85" y="66" text-anchor="middle" class="sub">dir: UP · conf: 0.72</text>
  </g>

  <g transform="translate(290,270)">
    <rect width="170" height="70" class="hashbox"/>
    <text x="85" y="22" text-anchor="middle" class="label">Block N+1</text>
    <text x="85" y="38" text-anchor="middle" class="hash">hash: 8c4b...a1f0</text>
    <text x="85" y="54" text-anchor="middle" class="sub">seq: 48292 · ts: 1715...</text>
    <text x="85" y="66" text-anchor="middle" class="sub">prev: a3f2...e7d1</text>
  </g>

  <g transform="translate(500,270)">
    <rect width="170" height="70" class="hashbox"/>
    <text x="85" y="22" text-anchor="middle" class="label">Block N+2</text>
    <text x="85" y="38" text-anchor="middle" class="hash">hash: e91d...b3c4</text>
    <text x="85" y="54" text-anchor="middle" class="sub">seq: 48293 · ts: 1715...</text>
    <text x="85" y="66" text-anchor="middle" class="sub">prev: 8c4b...a1f0</text>
  </g>

  <g transform="translate(710,270)">
    <rect width="170" height="70" class="hashbox"/>
    <text x="85" y="22" text-anchor="middle" class="label">Block N+3</text>
    <text x="85" y="38" text-anchor="middle" class="hash">hash: d5a2...f8e6</text>
    <text x="85" y="54" text-anchor="middle" class="sub">seq: 48294 · ts: 1715...</text>
    <text x="85" y="66" text-anchor="middle" class="sub">prev: e91d...b3c4</text>
  </g>

  <g transform="translate(920,270)">
    <rect width="170" height="70" class="hashbox"/>
    <text x="85" y="22" text-anchor="middle" class="label">Block N+4</text>
    <text x="85" y="38" text-anchor="middle" class="hash">hash: 7b3c...d2a5</text>
    <text x="85" y="54" text-anchor="middle" class="sub">seq: 48295 · ts: 1715...</text>
    <text x="85" y="66" text-anchor="middle" class="sub">prev: d5a2...f8e6</text>
  </g>

  <!-- Chain arrows -->
  <line x1="250" y1="305" x2="290" y2="305" class="arrow"/>
  <line x1="460" y1="305" x2="500" y2="305" class="arrow"/>
  <line x1="670" y1="305" x2="710" y2="305" class="arrow"/>
  <line x1="880" y1="305" x2="920" y2="305" class="arrow"/>

  <!-- Bottom: Trust Properties -->
  <text x="600" y="400" text-anchor="middle" class="title" style="font-size:14px;">What This Guarantees</text>

  <g transform="translate(60,430)">
    <rect width="200" height="80" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="label" style="fill:#00ffa3;">Tamper-Proof</text>
    <text x="100" y="50" text-anchor="middle" class="sub">Modifying any prediction breaks</text>
    <text x="100" y="66" text-anchor="middle" class="sub">the entire hash chain. Detected</text>
    <text x="100" y="82" text-anchor="middle" class="sub">by any mirror node instantly.</text>
  </g>
  <g transform="translate(290,430)">
    <rect width="200" height="80" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="label" style="fill:#1e90ff;">Fair Ordering</text>
    <text x="100" y="50" text-anchor="middle" class="sub">Hashgraph median timestamps</text>
    <text x="100" y="66" text-anchor="middle" class="sub">prevent front-running. No</text>
    <text x="100" y="82" text-anchor="middle" class="sub">miner, no MEV extraction.</text>
  </g>
  <g transform="translate(520,430)">
    <rect width="200" height="80" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="label" style="fill:#7c3aed;">Audit Trail</text>
    <text x="100" y="50" text-anchor="middle" class="sub">Every prediction queryable by</text>
    <text x="100" y="66" text-anchor="middle" class="sub">hash. Regulators, users, or</text>
    <text x="100" y="82" text-anchor="middle" class="sub">researchers can verify freely.</text>
  </g>
  <g transform="translate(750,430)">
    <rect width="200" height="80" class="panel"/>
    <text x="100" y="28" text-anchor="middle" class="label" style="fill:#f97316;">Cost Efficient</text>
    <text x="100" y="50" text-anchor="middle" class="sub">$0.0001 per HCS message.</text>
    <text x="100" y="66" text-anchor="middle" class="sub">288 proofs/day costs &lt;$0.03.</text>
    <text x="100" y="82" text-anchor="middle" class="sub">Sustainable at any scale.</text>
  </g>
  <g transform="translate(980,430)">
    <rect width="160" height="80" class="panel"/>
    <text x="80" y="28" text-anchor="middle" class="label" style="fill:#e2e8f0;">Open Verification</text>
    <text x="80" y="50" text-anchor="middle" class="sub">No special access needed.</text>
    <text x="80" y="66" text-anchor="middle" class="sub">Any Hedera mirror node</text>
    <text x="80" y="82" text-anchor="middle" class="sub">can independently audit.</text>
  </g>
</svg>
