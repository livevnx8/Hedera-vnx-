<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg { fill: #0c1020; }
      .panel { fill: #111633; stroke: #1e2a4a; stroke-width: 1.5; rx: 6; }
      .hero { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 20px; font-weight: 700; fill: #e2e8f0; }
      .title { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 13px; font-weight: 600; fill: #8892b0; }
      .label { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 11px; font-weight: 500; fill: #ccd6f6; }
      .sub { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size: 9px; fill: #5c6b9a; }
    </style>
  </defs>
  <rect width="1000" height="500" class="bg"/>
  <text x="500" y="36" text-anchor="middle" class="hero">Horizontal Scalability — Adding Nodes = Linear Throughput</text>

  <!-- Chart area -->
  <g transform="translate(100,80)">
    <!-- Axes -->
    <line x1="50" y1="0" x2="50" y2="300" stroke="#1e2a4a" stroke-width="1.5"/>
    <line x1="50" y1="300" x2="750" y2="300" stroke="#1e2a4a" stroke-width="1.5"/>
    
    <!-- Grid lines -->
    <line x1="50" y1="240" x2="750" y2="240" stroke="#1e2a4a" stroke-width="0.3"/>
    <line x1="50" y1="180" x2="750" y2="180" stroke="#1e2a4a" stroke-width="0.3"/>
    <line x1="50" y1="120" x2="750" y2="120" stroke="#1e2a4a" stroke-width="0.3"/>
    <line x1="50" y1="60" x2="750" y2="60" stroke="#1e2a4a" stroke-width="0.3"/>
    
    <!-- Y-axis labels -->
    <text x="35" y="305" text-anchor="end" class="sub">0</text>
    <text x="35" y="245" text-anchor="end" class="sub">25K</text>
    <text x="35" y="185" text-anchor="end" class="sub">50K</text>
    <text x="35" y="125" text-anchor="end" class="sub">75K</text>
    <text x="35" y="65" text-anchor="end" class="sub">100K</text>
    <text x="25" y="150" text-anchor="middle" class="title" transform="rotate(-90,25,150)">Predictions / Minute</text>
    
    <!-- X-axis labels -->
    <text x="50" y="320" text-anchor="middle" class="sub">1 node</text>
    <text x="200" y="320" text-anchor="middle" class="sub">2 nodes</text>
    <text x="350" y="320" text-anchor="middle" class="sub">4 nodes</text>
    <text x="500" y="320" text-anchor="middle" class="sub">8 nodes</text>
    <text x="650" y="320" text-anchor="middle" class="sub">16 nodes</text>
    <text x="750" y="320" text-anchor="middle" class="sub">32 nodes</text>
    <text x="400" y="345" text-anchor="middle" class="title">VNX Swarm Nodes</text>
    
    <!-- VNX Line (linear) -->
    <polyline points="50,300 200,240 350,180 500,120 650,60 750,0" fill="none" stroke="#00ffa3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="50" cy="300" r="5" fill="#00ffa3"/>
    <circle cx="200" cy="240" r="5" fill="#00ffa3"/>
    <circle cx="350" cy="180" r="5" fill="#00ffa3"/>
    <circle cx="500" cy="120" r="5" fill="#00ffa3"/>
    <circle cx="650" cy="60" r="5" fill="#00ffa3"/>
    <circle cx="750" cy="0" r="5" fill="#00ffa3"/>
    
    <!-- Data labels on VNX line -->
    <text x="50" y="290" text-anchor="middle" class="label" style="fill:#00ffa3;font-size:10px;">4.3K</text>
    <text x="200" y="225" text-anchor="middle" class="label" style="fill:#00ffa3;font-size:10px;">8.6K</text>
    <text x="350" y="165" text-anchor="middle" class="label" style="fill:#00ffa3;font-size:10px;">17.1K</text>
    <text x="500" y="105" text-anchor="middle" class="label" style="fill:#00ffa3;font-size:10px;">34.3K</text>
    <text x="650" y="45" text-anchor="middle" class="label" style="fill:#00ffa3;font-size:10px;">68.6K</text>
    <text x="750" y="-10" text-anchor="middle" class="label" style="fill:#00ffa3;font-size:10px;">137K</text>
    
    <!-- Competitor line (sub-linear) -->
    <polyline points="50,300 200,255 350,215 500,185 650,165 750,155" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round"/>
    <text x="750" y="150" text-anchor="end" class="sub" style="fill:#ef4444;">Centralized API (bottleneck)</text>
  </g>

  <!-- Bottom stats -->
  <g transform="translate(60,420)">
    <rect width="260" height="60" class="panel"/>
    <text x="130" y="22" text-anchor="middle" class="label" style="fill:#00ffa3;font-size:13px;">Perfectly Linear</text>
    <text x="130" y="42" text-anchor="middle" class="sub">Each node adds 4,285 pred/min — no coordination overhead</text>
  </g>
  <g transform="translate(350,420)">
    <rect width="260" height="60" class="panel"/>
    <text x="130" y="22" text-anchor="middle" class="label" style="fill:#1e90ff;font-size:13px;">Stateless Design</text>
    <text x="130" y="42" text-anchor="middle" class="sub">Nodes share nothing. Add / remove without reconfiguration.</text>
  </g>
  <g transform="translate(640,420)">
    <rect width="300" height="60" class="panel"/>
    <text x="150" y="22" text-anchor="middle" class="label" style="fill:#7c3aed;font-size:13px;">HCS Synchronizes Weights</text>
    <text x="150" y="42" text-anchor="middle" class="sub">Adaptive weights propagate via Hedera — consensus-secured</text>
  </g>
</svg>
