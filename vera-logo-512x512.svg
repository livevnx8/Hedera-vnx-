<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Outer ring gradient -->
    <linearGradient id="outerRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="25%" stop-color="#0d2137"/>
      <stop offset="50%" stop-color="#1e4a6e"/>
      <stop offset="75%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    
    <!-- Cyan accent gradient -->
    <linearGradient id="cyanAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#00a8cc"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    
    <!-- Inner geometric gradient -->
    <radialGradient id="innerGeo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="60%" stop-color="#143d5c"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </radialGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="#0a1628"/>
  
  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#outerRing)" stroke-width="8"/>
  <circle cx="256" cy="256" r="226" fill="none" stroke="#143d5c" stroke-width="2"/>
  
  <!-- Inner geometric pattern - Flower of Life style -->
  <g transform="translate(256, 256)">
    <!-- Center hexagon -->
    <polygon points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45" 
             fill="none" stroke="url(#cyanAccent)" stroke-width="6" filter="url(#glow)"/>
    
    <!-- Six overlapping circles forming flower pattern -->
    <g fill="none" stroke="#1e5a82" stroke-width="4" opacity="0.8">
      <circle cx="0" cy="-100" r="100"/>
      <circle cx="86.6" cy="-50" r="100"/>
      <circle cx="86.6" cy="50" r="100"/>
      <circle cx="0" cy="100" r="100"/>
      <circle cx="-86.6" cy="50" r="100"/>
      <circle cx="-86.6" cy="-50" r="100"/>
    </g>
    
    <!-- Intersection points highlighted -->
    <g fill="url(#cyanAccent)" opacity="0.9">
      <circle cx="0" cy="-100" r="10"/>
      <circle cx="86.6" cy="-50" r="10"/>
      <circle cx="86.6" cy="50" r="10"/>
      <circle cx="0" cy="100" r="10"/>
      <circle cx="-86.6" cy="50" r="10"/>
      <circle cx="-86.6" cy="-50" r="10"/>
    </g>
    
    <!-- Inner star/connector lines -->
    <g stroke="url(#cyanAccent)" stroke-width="3" opacity="0.6">
      <line x1="0" y1="-90" x2="0" y2="-175"/>
      <line x1="78" y1="-45" x2="151.5" y2="-87.5"/>
      <line x1="78" y1="45" x2="151.5" y2="87.5"/>
      <line x1="0" y1="90" x2="0" y2="175"/>
      <line x1="-78" y1="45" x2="-151.5" y2="87.5"/>
      <line x1="-78" y1="-45" x2="-151.5" y2="-87.5"/>
    </g>
    
    <!-- Central core element -->
    <circle cx="0" cy="0" r="30" fill="url(#innerGeo)" stroke="url(#cyanAccent)" stroke-width="6" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="15" fill="url(#cyanAccent)" opacity="0.8"/>
    
    <!-- Small decorative dots at ring -->
    <g fill="#00d4ff" opacity="0.7">
      <circle cx="0" cy="-210" r="6"/>
      <circle cx="182" cy="-105" r="6"/>
      <circle cx="182" cy="105" r="6"/>
      <circle cx="0" cy="210" r="6"/>
      <circle cx="-182" cy="105" r="6"/>
      <circle cx="-182" cy="-105" r="6"/>
    </g>
  </g>
  
  <!-- Outer accent ring segments -->
  <g transform="translate(256, 256)" fill="none" stroke="url(#cyanAccent)" stroke-width="6" stroke-linecap="round">
    <path d="M 0,-230 A 230,230 0 0,1 67.5,-221" opacity="0.8"/>
    <path d="M 199,-115 A 230,230 0 0,1 221,-67.5" opacity="0.8"/>
    <path d="M 221,67.5 A 230,230 0 0,1 199,115" opacity="0.8"/>
    <path d="M 67.5,221 A 230,230 0 0,1 0,230" opacity="0.8"/>
    <path d="M -67.5,221 A 230,230 0 0,1 -199,115" opacity="0.8"/>
    <path d="M -221,67.5 A 230,230 0 0,1 -221,-67.5" opacity="0.8"/>
    <path d="M -199,-115 A 230,230 0 0,1 -67.5,-221" opacity="0.8"/>
  </g>
</svg>
