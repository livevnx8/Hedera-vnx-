groups:
  - name: vera-alerts
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(vera_hcs_failures_total[5m]))
            /
            sum(rate(vera_hcs_messages_total[5m]))
          ) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HCS error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over last 5 minutes"

      - alert: HighLatency
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(vera_request_duration_seconds_bucket[5m])) by (le)
          ) > 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "p99 latency is {{ $value }}s"

      - alert: VNXSwarmDegraded
        expr: vera_vnx_swarm_health < 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "VNX swarm health degraded"
          description: "VNX swarm health is {{ $value | humanizePercentage }}"

      - alert: HederaSwarmDegraded
        expr: vera_hedera_swarm_health < 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Hedera VNX swarm health degraded"
          description: "Hedera swarm health is {{ $value | humanizePercentage }}"

      - alert: SpecialistDown
        expr: vera_swarm_specialists_active < 45
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Specialists are down"
          description: "Only {{ $value }} specialists active (expected 47)"

      - alert: CircuitBreakerOpen
        expr: vera_circuit_breaker_state == 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker open"
          description: "Circuit {{ $labels.name }} is open"

      - alert: PredictionAccuracyLow
        expr: vera_prediction_accuracy < 0.55
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "Prediction accuracy below threshold"
          description: "{{ $labels.token }} accuracy is {{ $value | humanizePercentage }}"

      - alert: DatabaseConnectionFailed
        expr: vera_db_connection_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Database connection failed"
          description: "Cannot connect to PostgreSQL"

      - alert: RedisUnavailable
        expr: vera_redis_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis is unavailable"
          description: "Cache layer is down"

      - alert: HighAlertVolume
        expr: sum(rate(vera_alerts_total[5m])) * 60 > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High alert volume"
          description: "{{ $value }} alerts/minute detected"
